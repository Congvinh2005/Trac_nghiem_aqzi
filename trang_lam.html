<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài Thi Trắc Nghiệm</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    color: #222;
    font-size: 14px;
  }

  /* ── TOP NAV ── */
  .top-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 0 20px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-left { display: flex; align-items: center; gap: 6px; }
  .btn-back {
    display: flex; align-items: center; gap: 5px;
    background: none; border: none; cursor: pointer;
    color: #555; font-size: 13px; padding: 6px 10px;
    border-radius: 6px;
  }
  .btn-back:hover { background: #f5f5f5; }
  .btn-back svg { width: 16px; height: 16px; }

  .nav-center {
    position: absolute; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
  }
  .student-name { font-size: 13px; color: #555; }
  .chevron-btn {
    background: none; border: none; cursor: pointer;
    color: #777; display: flex; align-items: center;
  }

  .nav-right { display: flex; align-items: center; gap: 14px; }
  .time-badge {
    display: flex; align-items: center; gap: 5px;
    color: #555; font-size: 13px;
  }
  .time-badge svg { width: 15px; height: 15px; color: #999; }

  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: #555; padding: 6px; border-radius: 6px;
    display: flex; align-items: center;
  }
  .icon-btn:hover { background: #f0f0f0; }
  .icon-btn svg { width: 18px; height: 18px; }

  .btn-submit {
    background: #1a6ef5; color: #fff;
    border: none; border-radius: 8px;
    padding: 8px 18px; font-size: 13px;
    font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-submit:hover { background: #155de0; }
  .btn-submit svg { width: 15px; height: 15px; }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    min-height: calc(100vh - 52px);
  }

  /* ── MAIN CONTENT ── */
  .main {
    flex: 1;
    padding: 24px 28px;
    overflow-y: auto;
    max-height: calc(100vh - 52px);
  }

  .chapter-title {
    font-size: 13.5px;
    font-weight: 600;
    color: #333;
    margin-bottom: 18px;
  }

  /* ── QUESTION CARD ── */
  .question-card {
    background: #fff;
    border-radius: 10px;
    padding: 20px 24px 24px;
    margin-bottom: 20px;
    border: 1px solid #e8e8e8;
  }

  .question-header {
    font-weight: 600;
    margin-bottom: 6px;
    font-size: 14px;
  }

  .question-text {
    color: #333;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 1.5;
  }

  .pick-label {
    font-size: 12px;
    color: #888;
    text-align: center;
    margin-bottom: 16px;
    display: block;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }

  .option-radio {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2px solid #ccc;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: #555;
    flex-shrink: 0;
    transition: all .15s;
  }

  .option:hover .option-radio {
    border-color: #1a6ef5;
    color: #1a6ef5;
  }

  .option.selected .option-radio {
    background: #1a6ef5;
    border-color: #1a6ef5;
    color: #fff;
  }

  .option-label {
    border: 1px solid #d8d8d8;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13.5px;
    color: #333;
    background: #fff;
    cursor: pointer;
    transition: all .15s;
    flex: 1;
  }

  .option:hover .option-label {
    border-color: #1a6ef5;
    background: #f0f5ff;
  }

  .option.selected .option-label {
    border-color: #1a6ef5;
    background: #f0f5ff;
    color: #1a6ef5;
    font-weight: 500;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 320px;
    background: #fff;
    border-left: 1px solid #e0e0e0;
    padding: 20px 16px;
    overflow-y: auto;
    max-height: calc(100vh - 52px);
    flex-shrink: 0;
  }

  .sidebar-title {
    font-size: 14px;
    font-weight: 700;
    color: #222;
    margin-bottom: 14px;
  }

  .group-label {
    font-size: 12.5px;
    font-weight: 600;
    color: #444;
    margin-bottom: 10px;
    margin-top: 16px;
  }

  .group-label:first-of-type { margin-top: 0; }

  .num-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 4px;
  }

  .num-btn {
    height: 34px;
    border-radius: 6px;
    border: 1px solid #e0e0e0;
    background: #fff;
    font-size: 12.5px;
    color: #444;
    cursor: pointer;
    font-weight: 500;
    transition: all .12s;
  }

  .num-btn:hover {
    border-color: #1a6ef5;
    color: #1a6ef5;
    background: #f0f5ff;
  }

  .num-btn.answered {
    background: #1a6ef5;
    border-color: #1a6ef5;
    color: #fff;
  }

  .num-btn.current {
    border-color: #f5a623;
    background: #fff8ec;
    color: #e08c00;
    font-weight: 700;
  }
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="top-nav">
  <div class="nav-left">
    <button class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Quay lại
    </button>
  </div>

  <div class="nav-center">
    <span class="student-name">Thí sinh: dv vinh</span>
    <button class="chevron-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </div>

  <div class="nav-right">
    <div class="time-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Không giới hạn
    </div>
    <button class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <button class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </button>
    <button class="btn-submit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      Nộp bài
    </button>
  </div>
</nav>

<!-- LAYOUT -->
<div class="layout">

  <!-- MAIN -->
  <main class="main" id="mainContent">
    <div class="chapter-title">Chương 1: Khái niệm cơ bản về cơ sở dữ liệu phân tán</div>
    <!-- Questions injected by JS -->
  </main>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">Danh sách câu hỏi</div>

    <div class="group-label">Nhóm 1</div>
    <div class="num-grid" id="grid1"></div>

    <div class="group-label">Nhóm 2</div>
    <div class="num-grid" id="grid2"></div>
  </aside>

</div>

<script>
const questions = [
  {
    id: 1,
    text: "Một hệ thống phân tán bao gồm hai phần chính nào?",
    options: [
      "Phần cứng và phần mềm.",
      "Mạng máy tính và CSDL phân tán.",
      "Máy chủ và máy khách.",
      "Hệ điều hành và ứng dụng cơ sở dữ liệu phân tán"
    ]
  },
  {
    id: 2,
    text: "Mạng Star (hình sao) sử dụng thiết bị trung tâm nào để kết nối?",
    options: [
      "Modem và Switch",
      "Router",
      "Hub hoặc Switch.",
      "Repeater."
    ]
  },
  {
    id: 3,
    text: "Ưu điểm của cấu trúc mạng Star là gì?",
    options: [
      "Tiết kiệm dây cáp nhất.",
      "Dễ dàng mở rộng hoặc thu hẹp và cung cấp chế độ quản lý tập trung.",
      "Hoạt động bình thường ngay cả khi Hub trung tâm bị hỏng hoặc có lỗi xảy ra",
      "Không tắc nghẽn lần đặt."
    ]
  },
  {
    id: 4,
    text: "Giao thức nào được sử dụng phổ biến nhất trong mạng LAN hiện nay?",
    options: [
      "Token Ring",
      "Ethernet",
      "FDDI",
      "ATM"
    ]
  },
  {
    id: 5,
    text: "Cơ sở dữ liệu phân tán (CSDL phân tán) là gì?",
    options: [
      "CSDL lưu trữ trên một máy chủ duy nhất.",
      "CSDL được phân tán trên nhiều máy tính kết nối qua mạng.",
      "CSDL chỉ truy cập được từ mạng nội bộ.",
      "CSDL không có mối quan hệ giữa các bảng."
    ]
  },
  {
    id: 6,
    text: "Tính trong suốt phân tán (distribution transparency) có nghĩa là gì?",
    options: [
      "Dữ liệu được mã hóa hoàn toàn.",
      "Người dùng không cần biết dữ liệu được lưu ở đâu.",
      "Hệ thống không có lỗi.",
      "Mạng luôn hoạt động ổn định."
    ]
  }
];

const answers = {};

function renderQuestions() {
  const container = document.getElementById('mainContent');
  // Keep chapter title
  const title = container.querySelector('.chapter-title');
  container.innerHTML = '';
  if (title) container.appendChild(title);

  questions.forEach(q => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `q${q.id}`;
    card.innerHTML = `
      <div class="question-header">Câu ${q.id}</div>
      <div class="question-text">${q.text}</div>
      <span class="pick-label">Chọn một đáp án đúng</span>
      <div class="options">
        ${q.options.map((opt, i) => {
          const letter = ['A','B','C','D'][i];
          return `
            <div class="option" data-q="${q.id}" data-i="${i}" onclick="selectOption(${q.id},${i})">
              <div class="option-radio">${letter}</div>
              <div class="option-label">${opt}</div>
            </div>`;
        }).join('')}
      </div>
    `;
    container.appendChild(card);
  });
}

function selectOption(qId, idx) {
  answers[qId] = idx;
  // Update option visuals
  document.querySelectorAll(`.option[data-q="${qId}"]`).forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  updateGrid();
}

function renderGrids() {
  // Group 1: 50 questions
  const g1 = document.getElementById('grid1');
  g1.innerHTML = '';
  for (let i = 1; i <= 50; i++) {
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.textContent = String(i).padStart(2, '0');
    btn.id = `g1_${i}`;
    btn.onclick = () => scrollToQuestion(i);
    g1.appendChild(btn);
  }

  // Group 2: 30 questions
  const g2 = document.getElementById('grid2');
  g2.innerHTML = '';
  for (let i = 1; i <= 30; i++) {
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.textContent = String(i).padStart(2, '0');
    btn.id = `g2_${i}`;
    g2.appendChild(btn);
  }
}

function updateGrid() {
  questions.forEach(q => {
    const btn = document.getElementById(`g1_${q.id}`);
    if (btn) btn.classList.toggle('answered', answers[q.id] !== undefined);
  });
}

function scrollToQuestion(id) {
  const el = document.getElementById(`q${id}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

renderQuestions();
renderGrids();
</script>
</body>
</html>
