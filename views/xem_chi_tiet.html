<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chi tiết bài thi - Vinhzota</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/components/sidebar.css"/>
<link rel="stylesheet" href="../assets/components/header.css"/>
<link rel="stylesheet" href="../assets/components/footer.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --topbar-h: 60px;
    --primary: #1e5abf;
    --primary-light: #3b82f6;
    --accent-green: #22c55e;
    --accent-orange: #f97316;
    --accent-red: #ef4444;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --text-light: #94a3b8;
    --border: #e2e8f0;
    --bg: #f1f5f9;
    --card-bg: #ffffff;
    --badge-blue: #2563eb;
    --blue-vip: #38bdf8;
  }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── MAIN ── */
  .main-wrap {
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  /* ── TOPBAR ── */
  .topbar {
    height: var(--topbar-h);
    background: #fff;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 22px;
    gap: 12px;
    position: sticky; top: 0;
    z-index: 50;
  }
  .topbar .back-btn {
    display: flex; align-items: center; gap: 6px;
    color: var(--text-main);
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: color .15s;
  }
  .topbar .back-btn:hover { color: var(--primary); }
  .topbar .back-btn i { font-size: 13px; }

  .topbar-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 10px;
  }

  .btn-buy {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 7px 16px;
    border-radius: 8px;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    transition: background .15s;
  }
  .btn-buy:hover { background: #1749a0; }

  .btn-vip {
    background: linear-gradient(90deg, #38bdf8, #6366f1);
    color: #fff;
    border: none;
    padding: 7px 16px;
    border-radius: 8px;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    transition: opacity .15s;
  }
  .btn-vip:hover { opacity: .88; }

  .flag-icon {
    width: 28px; height: 20px;
    border-radius: 3px;
    background: #da251d;
    position: relative; overflow: hidden;
  }
  .flag-icon::after {
    content: '⭐';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 12px; color: #f5d110;
  }

  .notif-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; color: var(--text-muted);
    transition: background .15s;
  }
  .notif-btn:hover { background: var(--border); }

  .user-chip {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer;
  }
  .user-chip .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #38bdf8);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 14px;
    overflow: hidden;
  }
  .user-chip .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-chip .user-info { line-height: 1.2; }
  .user-chip .user-info .name { font-size: 13px; font-weight: 600; }
  .user-chip .user-info .role { font-size: 11px; color: var(--text-muted); }

  /* ── CONTENT ── */
  .content-area {
    flex: 1;
    display: flex;
    gap: 0;
    padding: 22px;
    gap: 18px;
    align-items: flex-start;
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    width: 310px;
    flex-shrink: 0;
    background: var(--card-bg);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .student-header {
    padding: 16px 18px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .student-header .stu-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #fb923c, #f43f5e);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 18px;
    flex-shrink: 0;
  }
  .student-header .stu-info .stu-name {
    font-size: 14px; font-weight: 600;
    display: flex; align-items: center; gap: 5px;
  }
  .student-header .stu-info .stu-email {
    font-size: 12px; color: var(--text-muted);
    display: flex; align-items: center; gap: 5px;
    margin-top: 2px;
  }

  .info-block {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
  }
  .info-block .info-title {
    font-size: 12px; font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 12px;
    background: #f8fafc;
    margin: -16px -18px 12px;
    padding: 10px 18px;
  }

  .info-row {
    display: flex; align-items: flex-start;
    gap: 8px; margin-bottom: 10px; font-size: 13.5px;
  }
  .info-row:last-child { margin-bottom: 0; }
  .info-row .label { color: var(--text-muted); white-space: nowrap; min-width: 90px; }
  .info-row .val { font-weight: 500; color: var(--text-main); }
  .info-row .val.score { font-size: 17px; font-weight: 700; }
  .info-row .val.no-comment { color: var(--accent-orange); }

  .edit-icon {
    margin-left: auto;
    color: var(--text-light);
    cursor: pointer; font-size: 14px;
    transition: color .15s;
  }
  .edit-icon:hover { color: var(--primary); }

  .action-row {
    display: flex; align-items: center;
    gap: 8px; margin-bottom: 10px; font-size: 13.5px;
  }
  .action-row .label { color: var(--text-muted); flex: 1; }
  .action-icon {
    cursor: pointer; font-size: 16px;
    transition: opacity .15s;
  }
  .action-icon:hover { opacity: .7; }
  .action-icon.red { color: var(--accent-red); }
  .action-icon.blue { color: var(--primary-light); }

  .view-all-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
    padding: 11px 18px;
    font-size: 13.5px; font-weight: 500;
    color: var(--primary);
    cursor: pointer;
    border-top: 1px solid var(--border);
    transition: background .15s;
  }
  .view-all-btn:hover { background: #f0f4ff; }

  .pagination-row {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 10px 18px;
    border-top: 1px solid var(--border);
  }
  .pag-btn {
    width: 30px; height: 30px;
    border-radius: 8px; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 13px; color: var(--text-muted);
    background: #fff; transition: background .15s, color .15s;
  }
  .pag-btn:hover { background: #f0f4ff; color: var(--primary); }

  /* ── RIGHT PANEL ── */
  .right-panel {
    flex: 1;
    background: var(--card-bg);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .right-topbar {
    display: flex; align-items: center;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    gap: 14px;
    min-height: 52px;
  }

  .collapse-btn {
    width: 30px; height: 30px;
    border-radius: 7px;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-muted); font-size: 13px;
    transition: background .15s;
  }
  .collapse-btn:hover { background: #f0f4ff; }

  .exam-title {
    flex: 1; text-align: center;
    font-size: 14px; font-weight: 600; color: var(--text-main);
  }

  .right-actions { display: flex; gap: 8px; }

  .btn-dung {
    background: var(--accent-green);
    color: #fff; border: none;
    padding: 6px 16px; border-radius: 7px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  .btn-dung:hover { opacity: .85; }

  .btn-degoc {
    background: var(--accent-orange);
    color: #fff; border: none;
    padding: 6px 16px; border-radius: 7px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  .btn-degoc:hover { opacity: .85; }

  .menu-btn {
    width: 30px; height: 30px;
    border-radius: 7px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-muted); font-size: 16px;
    transition: background .15s;
  }
  .menu-btn:hover { background: #f0f4ff; }

  /* Tabs */
  .tabs {
    display: flex; align-items: center;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    gap: 0;
  }
  .tab-item {
    padding: 13px 16px;
    font-size: 13.5px; font-weight: 500;
    cursor: pointer;
    color: var(--text-muted);
    border-bottom: 2.5px solid transparent;
    margin-bottom: -1px;
    transition: color .15s, border-color .15s;
  }
  .tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tab-item:hover:not(.active) { color: var(--text-main); }

  .right-body {
    flex: 1;
    min-height: 300px;
    padding: 20px;
    overflow-y: auto;
    background: #f8fafc;
  }

  .questions-container {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .question-block {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #e8e8e8;
    padding: 20px 22px;
  }

  .q-meta {
    font-size: 12px; color: #999; margin-bottom: 4px;
  }
  .q-meta .q-num { color: #333; font-weight: 700; font-size: 13.5px; margin-right: 6px; }

  .q-text {
    font-size: 13.5px; font-weight: 600; color: #111;
    margin-bottom: 18px; line-height: 1.55;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 28px;
    margin-bottom: 18px;
  }

  .opt-row {
    display: flex; gap: 8px; align-items: flex-start;
    font-size: 13px; color: #333; line-height: 1.45;
  }

  .opt-letter { font-weight: 700; flex-shrink: 0; min-width: 18px; }

  .answer-bar {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 10px; margin-top: 6px;
  }

  .correct-label {
    font-size: 13px; font-weight: 700; color: #16a34a;
  }
  .wrong-label {
    font-size: 13px; font-weight: 700; color: #ef4444;
  }

  .answer-chips {
    display: flex; gap: 0;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px; overflow: hidden;
  }

  .chip {
    width: 42px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
    border-right: 1px solid #e0e0e0;
    color: #333;
  }
  .chip:last-child { border-right: none; }

  .chip.correct-chip {
    color: #16a34a;
  }
  .chip.wrong-chip {
    color: #ef4444;
  }

  .chip-icon { font-size: 14px; margin-right: 2px; }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .status-correct {
    background: #d1fae5;
    color: #065f46;
  }

  .status-wrong {
    background: #fee2e2;
    color: #991b1b;
  }

  .status-skipped {
    background: #f3f4f6;
    color: #6b7280;
  }

  .badge-count {
    display: inline-flex; align-items: center; justify-content: center;
    background: #f1f5f9;
    color: var(--text-muted);
    font-size: 11px; font-weight: 600;
    border-radius: 999px;
    padding: 1px 7px;
    margin-left: 4px;
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>
<script src="../assets/components/sidebar.js"></script>
<script>
  // Load sidebar with active index 2 (Lớp học)
  loadSidebar(2);
</script>

<!-- Main Content Wrapper -->
<div class="main-content">

  <!-- Header -->
  <div id="header-container"></div>
  <script src="../assets/components/header.js?v=2"></script>
  <script>
    loadHeader({
      showBack: true,
      showSearch: false,
      showFilter: false,
      userName: 'Giáo viên',
      userAvatar: 'GV'
    });
  </script>

  <!-- CONTENT -->
  <div class="content-area">

    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="student-header">
        <div class="stu-avatar" id="stuAvatar">-</div>
        <div class="stu-info">
          <div class="stu-name" id="stuName">
            Đang tải...
          </div>
          <div class="stu-email">
            <i class="fas fa-envelope" style="font-size:11px"></i>
            <span id="stuEmail">-</span>
          </div>
        </div>
      </div>

      <div class="info-block">
        <div class="info-title">Thông tin chi tiết</div>

        <div class="info-row">
          <span class="label">Điểm:</span>
          <span class="val score" id="scoreValue">-/210</span>
        </div>

        <div class="info-row">
          <span class="label">Nhận xét:</span>
          <span class="val no-comment" id="commentText">Chưa có nhận xét</span>
          <span class="edit-icon" onclick="editComment()"><i class="fas fa-pen"></i></span>
        </div>

        <div class="info-row">
          <span class="label">Thời gian làm bài:</span>
          <span class="val" id="timeSpent">-</span>
        </div>

        <div class="info-row">
          <span class="label">Thời gian nộp bài:</span>
          <span class="val" id="submitTime">-</span>
        </div>

        <div class="info-row">
          <span class="label">Trắc nghiệm:</span>
          <span class="val" id="questionStats">-</span>
        </div>

        <div class="info-row">
          <span class="label">Giáo viên chấm:</span>
          <span class="val" id="teacherName">-</span>
        </div>

        <div class="action-row">
          <span class="label">Xem chi tiết quá trình làm bài:</span>
          <span class="action-icon blue" onclick="viewDetailProcess()"><i class="fas fa-eye"></i></span>
        </div>

        <div class="action-row">
          <span class="label">Xóa bài thi và cho thi lại:</span>
          <span class="action-icon red" onclick="deleteAndRetake()"><i class="fas fa-trash"></i></span>
        </div>

        <div class="action-row">
          <span class="label">Xóa bài thi và cấm học sinh thi:</span>
          <span class="action-icon red" onclick="deleteAndBan()"><i class="fas fa-trash"></i></span>
        </div>
      </div>

      <div class="view-all-btn" onclick="viewAllAttempts()">
        Xem các lần Thi <span class="badge-count" id="attemptCount">1</span>
      </div>

      <div class="pagination-row">
        <div class="pag-btn"><i class="fas fa-chevron-left"></i></div>
        <div class="pag-btn"><i class="fas fa-chevron-right"></i></div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="right-topbar">
        <div class="collapse-btn"><i class="fas fa-sidebar" style="font-size:12px"></i></div>
        <div class="exam-title" id="examTitle">Đang tải...</div>
        <div class="right-actions">
          <button class="btn-dung">Đúng</button>
          <button class="btn-degoc">Để gốc</button>
        </div>
        <div class="menu-btn"><i class="fas fa-ellipsis-v"></i></div>
      </div>

      <div class="tabs">
        <div class="tab-item active">Trắc nghiệm</div>
      </div>

      <div class="right-body">
        <div class="questions-container" id="questionsContainer">
          <!-- Questions will be loaded here -->
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const ma_bai_lam = urlParams.get('ma_bai_lam');

let submission = null;
let examData = null;
let questions = [];
let userAnswers = {};

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    if (!ma_bai_lam) {
        alert('Không tìm thấy bài làm');
        window.location.href = 'danh_sach_da_thi.html';
        return;
    }
    loadCurrentUser();
    loadDetail();
});

// Load current user info from session
async function loadCurrentUser() {
    try {
        const response = await fetch(API.AUTH + '?action=check_auth');
        const result = await response.json();

        if (result.authenticated && result.user) {
            const user = result.user;
            const displayName = user.full_name || user.ten_user || 'User';
            const role = user.phan_quyen === 'teacher' ? 'Giáo viên' : 'Học sinh';
            const avatarText = displayName.charAt(0).toUpperCase();

            document.getElementById('headerName').textContent = displayName;
            document.getElementById('headerAvatar').textContent = avatarText;
            document.querySelector('.user-chip .user-info .role').textContent = role;
        }
    } catch (error) {
        console.error('Error loading user:', error);
    }
}

// Load detail data
async function loadDetail() {
    try {
        // Get submission detail
        const subResponse = await fetch(API.SUBMISSION + '?action=get_submission_detail&ma_bai_lam=' + ma_bai_lam);
        const subResult = await subResponse.json();

        if (!subResult.success) {
            alert('Không tìm thấy bài làm');
            return;
        }

        submission = subResult.data;
        updateStudentInfo(submission);

        // Parse user answers
        try {
            userAnswers = JSON.parse(submission.danh_sach_dap_an || '{}');
        } catch (e) {}

        // Get exam info
        const examResponse = await fetch(API.EXAM + '?action=get_by_id&ma_de=' + submission.ma_de);
        const examResult = await examResponse.json();

        if (examResult.success) {
            examData = examResult.data;
            document.getElementById('examTitle').textContent = examData.ten_de;
        }

        // Get exam questions with correct answers
        const qResponse = await fetch(API.SUBMISSION + '?action=get_questions&ma_de=' + submission.ma_de);
        const qResult = await qResponse.json();

        if (qResult.success) {
            questions = qResult.data;
            renderQuestions();
        }

    } catch (error) {
        console.error('Load error:', error);
        alert('Có lỗi xảy ra');
    }
}

// Update student info
function updateStudentInfo(sub) {
    const studentName = sub.ten_hoc_sinh || 'Học sinh ẩn danh';
    const studentEmail = sub.email || '-';
    const score = parseFloat(sub.diem) || 0;
    const submitTime = new Date(sub.thoi_gian_nop);

    // Update student info (left panel)
    document.getElementById('stuName').textContent = studentName;
    document.getElementById('stuAvatar').textContent = studentName.charAt(0).toUpperCase();
    document.getElementById('stuEmail').textContent = studentEmail;

    // Update stats
    document.getElementById('scoreValue').textContent = `${score.toFixed(1)}/210`;
    document.getElementById('submitTime').textContent = formatDateTime(submitTime);
    document.getElementById('timeSpent').textContent = calculateTimeSpent(sub.danh_sach_dap_an);

    // Calculate question stats
    let answers = {};
    try {
        answers = JSON.parse(sub.danh_sach_dap_an || '{}');
    } catch (e) {}

    const totalAnswers = Object.keys(answers).length;
    document.getElementById('questionStats').textContent = `${totalAnswers} câu`;

    // Load teacher info (from session or exam)
    if (examData && examData.giao_vien) {
        document.getElementById('teacherName').textContent = examData.giao_vien;
    } else {
        document.getElementById('teacherName').textContent = 'Giáo viên';
    }
}

// Calculate time spent
function calculateTimeSpent(danhSachDapAn) {
    try {
        const answers = JSON.parse(danh_sach_dap_an || '{}');
        if (answers.thoi_gian_lam_bai) {
            const seconds = answers.thoi_gian_lam_bai;
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;

            if (h > 0) return `${h} giờ ${m} phút`;
            if (m > 0) return `${m} phút ${s} giây`;
            return `${s} giây`;
        }
    } catch (e) {}
    return 'N/A';
}

// Format datetime
function formatDateTime(date) {
    return date.toLocaleString('vi-VN', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

// Edit comment
function editComment() {
    const comment = prompt('Nhập nhận xét cho bài làm này:');
    if (comment !== null && comment.trim() !== '') {
        // TODO: Save to database
        document.getElementById('commentText').textContent = comment;
        document.getElementById('commentText').classList.remove('no-comment');
        alert('Đã lưu nhận xét');
    }
}

// View detail process
function viewDetailProcess() {
    window.location.href = `xem_dap_an.html?ma_bai_lam=${ma_bai_lam}`;
}

// Render chip
function renderChip(letter, correctAnswer, userAnswer) {
    const isCorrect = letter === correctAnswer;
    const isWrong = userAnswer && letter === userAnswer && !isCorrect;
    let cls = "chip";
    let icon = "";
    if (isCorrect) { cls += " correct-chip"; icon = '<span class="chip-icon">✓</span>'; }
    if (isWrong)   { cls += " wrong-chip";   icon = '<span class="chip-icon">✗</span>'; }
    return `<div class="${cls}">${icon}${letter}</div>`;
}

// Render questions
function renderQuestions() {
    const container = document.getElementById('questionsContainer');
    
    if (questions.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-file-alt"></i>
                Không có câu hỏi nào
            </div>
        `;
        return;
    }

    container.innerHTML = questions.map((q, index) => {
        const userAnswer = userAnswers[q.ma_cau_hoi];
        const correctAnswer = q.dap_an.find(a => a.la_dung);
        const isCorrect = userAnswer && correctAnswer && userAnswer.toUpperCase() === correctAnswer.ky_tu;
        const isSkipped = !userAnswer;

        let statusClass = 'status-correct';
        let statusText = 'Đúng';
        if (isSkipped) {
            statusClass = 'status-skipped';
            statusText = 'Bỏ qua';
        } else if (!isCorrect) {
            statusClass = 'status-wrong';
            statusText = 'Sai';
        }

        const labelClass = isCorrect ? "correct-label" : "wrong-label";
        const labelText = `Đáp án đúng: ${correctAnswer ? correctAnswer.ky_tu : 'N/A'}`;

        const chips = ["A","B","C","D"].map(l =>
            renderChip(l, correctAnswer ? correctAnswer.ky_tu : '', userAnswer)
        ).join("");

        const opts = q.dap_an.map(o => `
            <div class="opt-row">
                <span class="opt-letter">${o.ky_tu}.</span>
                <span>${o.noi_dung}</span>
            </div>`).join("");

        return `
            <div class="question-block">
                <div class="q-meta"><span class="q-num">Câu ${index + 1}</span> ID: ${q.ma_cau_hoi}</div>
                <div class="status-badge ${statusClass}">
                    <i class="fas ${isCorrect ? 'fa-check-circle' : isSkipped ? 'fa-minus-circle' : 'fa-times-circle'}"></i>
                    ${statusText}
                </div>
                <div class="q-text">${q.noi_dung}</div>
                <div class="options-grid">${opts}</div>
                <div class="answer-bar">
                    <span class="${labelClass}">${labelText}</span>
                    <div class="answer-chips">${chips}</div>
                </div>
            </div>`;
    }).join("");
}
