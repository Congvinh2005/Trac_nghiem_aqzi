<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đề thi - Vinhzota</title>
    <link rel="stylesheet" href="/vinhzota/assets/components/sidebar.css">
    <link rel="stylesheet" href="/vinhzota/assets/components/header.css">
    <link rel="stylesheet" href="/vinhzota/assets/components/footer.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #f4f6f9;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Main */
        .main {
            margin-left: 90px;
            padding: 20px;
            flex: 1;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }

        .search {
            width: 300px;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        .search:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Buttons */
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-blue { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-green { 
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 4px 12px rgba(17, 153, 142, 0.3);
        }

        .btn-cyan { 
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            box-shadow: 0 4px 12px rgba(0, 198, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Cards */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.3s;
            cursor: pointer;
        }

        .card:hover {
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .card-info {
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }

        .card-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #38ef7d;
            color: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 10px;
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .table-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 20px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        th {
            background: #fafafa;
            color: #555;
            font-weight: 600;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-active {
            background: #d4edda;
            color: #155724;
        }

        .status-inactive {
            background: #f8d7da;
            color: #721c24;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
            transition: all 0.3s;
        }

        .action-btn.view {
            background: #e3f2fd;
            color: #1976d2;
        }

        .action-btn.edit {
            background: #fff3e0;
            color: #f57c00;
        }

        .action-btn.delete {
            background: #ffebee;
            color: #d32f2f;
        }

        .action-btn:hover {
            transform: scale(1.05);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 16px;
            margin-bottom: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }

            .main {
                margin-left: 60px;
            }

            .header {
                margin-left: 60px;
            }

            .cards {
                grid-template-columns: 1fr;
            }

            .table-container {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar-container"></div>
    <script src="/vinhzota/assets/components/sidebar.js"></script>
    <script>
        // Load sidebar with active index 1 (Đề thi)
        loadSidebar(1);
    </script>

    <!-- Header -->
    <div id="header-container"></div>
    <script src="/vinhzota/assets/components/header.js"></script>
    <script>
        loadHeader({
            showBack: false,
            showSearch: false,
            userName: 'Giáo viên',
            userAvatar: 'GV'
        });
    </script>

    <!-- Main -->
    <div class="main">
        <!-- Top bar -->
        <div class="top-bar">
            <h1 class="page-title">Tất cả đề thi</h1>
            <input type="text" class="search" placeholder="Tìm kiếm đề thi..." id="searchInput">
        </div>

        <!-- Action buttons -->
        <div style="margin-bottom: 20px; display: flex; gap: 10px;">
            <button class="btn btn-green" onclick="window.location.href='tao_de.html'">+ Tạo đề thi</button>
            <button class="btn btn-cyan">Tạo từ ngân hàng</button>
            <button class="btn btn-blue">Tạo thư mục</button>
        </div>

        <!-- Cards view -->
        <div class="cards" id="cardsView">
            <!-- Cards will be loaded here -->
        </div>

        <!-- Table view -->
        <div class="table-container">
            <div class="table-header">
                <h2 class="table-title">Danh sách đề thi</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Tên đề thi</th>
                        <th>Mã code</th>
                        <th>Thời gian nộp</th>
                        <th>Trạng thái</th>
                        <th>Ngày tạo</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="examTableBody">
                    <!-- Rows will be loaded here -->
                </tbody>
            </table>
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">📝</div>
            <div class="empty-state-text">Chưa có đề thi nào</div>
            <button class="btn btn-green" onclick="window.location.href='tao_de.html'">+ Tạo đề thi đầu tiên</button>
        </div>
    </div>

    <script>
        let currentUser = null;

        // Check authentication on load
        async function checkAuth() {
            try {
                const response = await fetch('/vinhzota/controllers/auth_controller.php?action=check_auth');
                const result = await response.json();

                if (!result.authenticated || result.user.phan_quyen !== 'teacher') {
                    window.location.href = 'dang_nhap.html';
                    return;
                }

                currentUser = result.user;
                
                // Update header with user info
                const headerUserName = document.getElementById('headerUserName');
                const headerAvatar = document.getElementById('headerAvatar');
                if (headerUserName) {
                    headerUserName.textContent = result.user.full_name;
                }
                if (headerAvatar) {
                    headerAvatar.textContent = result.user.full_name.charAt(0).toUpperCase();
                }

                loadExams();
            } catch (error) {
                console.error('Auth error:', error);
                window.location.href = 'dang_nhap.html';
            }
        }

        // Load exams
        async function loadExams() {
            try {
                const response = await fetch('/vinhzota/controllers/exam_controller.php?action=get_by_teacher');
                const result = await response.json();

                if (result.success && result.data.length > 0) {
                    document.getElementById('emptyState').style.display = 'none';
                    renderExams(result.data);
                } else {
                    document.getElementById('emptyState').style.display = 'block';
                    document.getElementById('cardsView').innerHTML = '';
                    document.getElementById('examTableBody').innerHTML = '';
                }
            } catch (error) {
                console.error('Load exams error:', error);
            }
        }

        // Render exams
        function renderExams(exams) {
            // Render cards
            const cardsView = document.getElementById('cardsView');
            cardsView.innerHTML = exams.map(exam => `
                <div class="card" onclick="viewExam('${exam.ma_de}')">
                    <div class="card-title">${exam.ten_de}</div>
                    <div class="card-info">📅 ${formatDate(exam.ngay_tao)}</div>
                    <div class="card-info">⏰ ${exam.thoi_gian_nap ? formatDateTime(exam.thoi_gian_nap) : 'Không thời hạn'}</div>
                    <div class="card-info">🔑 ${exam.ma_code}</div>
                    <span class="card-badge">${exam.trang_thai === 'active' ? 'Hoạt động' : 'Không hoạt động'}</span>
                </div>
            `).join('');

            // Render table
            const tableBody = document.getElementById('examTableBody');
            tableBody.innerHTML = exams.map(exam => `
                <tr>
                    <td><strong>${exam.ten_de}</strong></td>
                    <td><code>${exam.ma_code}</code></td>
                    <td>${exam.thoi_gian_nap ? formatDateTime(exam.thoi_gian_nap) : '-'}</td>
                    <td><span class="status-badge ${exam.trang_thai === 'active' ? 'status-active' : 'status-inactive'}">${exam.trang_thai === 'active' ? 'Hoạt động' : 'Không hoạt động'}</span></td>
                    <td>${formatDate(exam.ngay_tao)}</td>
                    <td>
                        <button class="action-btn view" onclick="viewExam('${exam.ma_de}')">Xem</button>
                        <button class="action-btn edit" onclick="editExam('${exam.ma_de}')">Sửa</button>
                        <button class="action-btn delete" onclick="deleteExam('${exam.ma_de}')">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        // View exam
        function viewExam(ma_de) {
            window.location.href = `danh_sach_da_thi.html?ma_de=${ma_de}`;
        }

        // Edit exam
        function editExam(ma_de) {
            // Redirect to tao_de.html with edit mode and exam ID
            window.location.href = `/vinhzota/views/tao_de.html?mode=edit&ma_de=${ma_de}`;
        }

        // Delete exam
        async function deleteExam(ma_de) {
            if (!confirm('Bạn có chắc chắn muốn xóa đề thi này?')) {
                return;
            }

            try {
                const response = await fetch('/vinhzota/controllers/exam_controller.php?action=delete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ ma_de })
                });

                const result = await response.json();

                if (result.success) {
                    alert('Xóa đề thi thành công');
                    loadExams();
                } else {
                    alert(result.message);
                }
            } catch (error) {
                console.error('Delete exam error:', error);
                alert('Có lỗi xảy ra');
            }
        }

        // Logout
        async function logout() {
            if (!confirm('Bạn có chắc chắn muốn đăng xuất?')) {
                return;
            }

            try {
                const response = await fetch('/vinhzota/controllers/auth_controller.php?action=logout');
                const result = await response.json();

                if (result.success) {
                    window.location.href = result.redirect;
                }
            } catch (error) {
                console.error('Logout error:', error);
                window.location.href = 'dang_nhap.html';
            }
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', function() {
            const value = this.value.toLowerCase();
            const rows = document.querySelectorAll('#examTableBody tr');

            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(value) ? '' : 'none';
            });
        });

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('vi-VN', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });
        }

        // Format datetime
        function formatDateTime(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('vi-VN', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Initialize
        checkAuth();
    </script>
    
    <!-- Footer -->
    <div id="footer-container"></div>
    <script src="/vinhzota/assets/components/footer.js"></script>
</body>
</html>
