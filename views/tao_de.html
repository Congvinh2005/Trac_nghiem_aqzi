<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo đề thi - Vinhzota</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #f5f7fb;
        }

        /* Sidebar */
        .sidebar {
            width: 80px;
            height: 100vh;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 20px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #667eea;
            font-size: 24px;
            cursor: pointer;
        }

        .nav-item {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .nav-item.active {
            background: white;
            color: #667eea;
        }

        /* Header */
        .header {
            height: 60px;
            background: white;
            margin-left: 80px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 20px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.05);
        }

        .header button {
            margin-left: 10px;
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-blue {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-purple {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
        }

        /* Main */
        .main {
            margin-left: 80px;
            padding: 20px 40px;
        }

        /* Card */
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 1200px;
            margin: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
            color: #333;
        }

        /* Form */
        label {
            display: block;
            margin-top: 15px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-top: 5px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row > * {
            flex: 1;
        }

        /* Upload */
        .upload-area {
            margin-top: 10px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #666;
            font-size: 14px;
        }

        .upload-hint {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }

        /* Questions List */
        .questions-section {
            margin-top: 30px;
        }

        .question-item {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .question-number {
            font-weight: 600;
            color: #667eea;
            font-size: 16px;
        }

        .question-actions {
            display: flex;
            gap: 8px;
        }

        .question-actions button {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .btn-delete {
            background: #fee;
            color: #c33;
        }

        .btn-delete:hover {
            background: #fcc;
        }

        .question-content {
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 15px;
            color: #333;
            margin-bottom: 10px;
        }

        .answers-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .answer-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .answer-item:hover {
            border-color: #667eea;
        }

        .answer-item.correct {
            border-color: #10b981;
            background: #d1fae5;
        }

        .answer-letter {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            color: #666;
        }

        .answer-item.correct .answer-letter {
            background: #10b981;
            color: white;
        }

        .answer-text {
            flex: 1;
            font-size: 14px;
        }

        .correct-badge {
            font-size: 11px;
            padding: 2px 8px;
            background: #10b981;
            color: white;
            border-radius: 10px;
            font-weight: 500;
        }

        /* Footer */
        .footer {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
        }

        /* Radio group */
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: normal;
        }

        /* Loading */
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* Empty questions */
        .empty-questions {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }

            .main {
                margin-left: 60px;
                padding: 15px;
            }

            .card {
                padding: 20px;
            }

            .row {
                flex-direction: column;
            }

            .answers-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo" onclick="window.location.href='trang_admin.html'">V</div>
        <div class="nav-item active">📝</div>
    </div>

    <!-- Header -->
    <div class="header">
        <button class="btn-blue" onclick="window.location.href='trang_admin.html'">← Quay lại</button>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="card">
            <h1 class="title">TẠO ĐỀ THI MỚI</h1>

            <!-- Basic Info -->
            <label>Tên đề thi *</label>
            <input type="text" id="examTitle" placeholder="Nhập tên đề thi">

            <div class="row">
                <div>
                    <label>Thời gian nộp</label>
                    <input type="datetime-local" id="examDeadline">
                </div>
                <div>
                    <label>Mã code</label>
                    <input type="text" id="examCode" readonly style="background: #f5f5f5;">
                </div>
            </div>

            <!-- Upload -->
            <label>Nội dung</label>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📄</div>
                <div class="upload-text">Kéo thả file vào đây hoặc click để chọn</div>
                <div class="upload-hint">Hỗ trợ file .txt (Format: 1.Câu hỏi? A. Đáp án A B. Đáp án B...)</div>
                <input type="file" id="fileInput" accept=".txt,.csv" style="display: none;">
            </div>

            <!-- Questions -->
            <div class="questions-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="font-size: 16px;">Danh sách câu hỏi</h3>
                    <span id="questionCount" style="color: #667eea; font-weight: 600;">0 câu hỏi</span>
                </div>

                <div id="questionsList">
                    <div class="empty-questions" id="emptyQuestions">
                        <p>📝</p>
                        <p>Chưa có câu hỏi nào</p>
                        <p style="font-size: 13px; margin-top: 10px;">Upload file để tự động tạo câu hỏi</p>
                    </div>
                </div>
            </div>

            <!-- Options -->
            <div class="row" style="margin-top: 20px;">
                <div>
                    <label>Cho xem kết quả</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="showResult" value="no"> Không
                        </label>
                        <label>
                            <input type="radio" name="showResult" value="yes" checked> Có
                        </label>
                    </div>
                </div>
                <div>
                    <label>Yêu cầu đăng nhập</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="requireLogin" value="no" checked> Không
                        </label>
                        <label>
                            <input type="radio" name="requireLogin" value="yes"> Có
                        </label>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer">
                <button class="btn btn-secondary" onclick="window.location.href='trang_admin.html'">Hủy</button>
                <button class="btn btn-success" id="saveBtn" onclick="saveExam()">💾 Lưu và chia sẻ</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let ma_de = urlParams.get('ma_de');
        let ma_code = urlParams.get('ma_code');
        let questions = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (ma_code) {
                document.getElementById('examCode').value = ma_code;
            }
            setupUpload();
        });

        // Setup upload
        function setupUpload() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');

            uploadArea.addEventListener('click', () => fileInput.click());

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file) {
                    uploadFile(file);
                }
            });

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    uploadFile(file);
                }
            });
        }

        // Upload file
        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/vinhzota/controllers/exam_controller.php?action=parse_file', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    questions = result.data;
                    renderQuestions();
                    alert(`Đã tải ${questions.length} câu hỏi từ file`);
                } else {
                    alert('Lỗi: ' + result.message);
                }
            } catch (error) {
                console.error('Upload error:', error);
                alert('Có lỗi xảy ra khi upload file');
            }
        }

        // Render questions
        function renderQuestions() {
            const container = document.getElementById('questionsList');
            const emptyState = document.getElementById('emptyQuestions');
            const countLabel = document.getElementById('questionCount');

            countLabel.textContent = `${questions.length} câu hỏi`;

            if (questions.length === 0) {
                emptyState.style.display = 'block';
                container.innerHTML = '';
                container.appendChild(emptyState);
                return;
            }

            emptyState.style.display = 'none';
            container.innerHTML = questions.map((q, index) => `
                <div class="question-item">
                    <div class="question-header">
                        <span class="question-number">Câu ${q.thu_tu}</span>
                        <div class="question-actions">
                            <button class="btn-delete" onclick="deleteQuestion(${index})">Xóa</button>
                        </div>
                    </div>
                    <div class="question-content">
                        <div class="question-text">${q.noi_dung}</div>
                    </div>
                    <div class="answers-list">
                        ${q.dap_an.map((a, aIndex) => `
                            <div class="answer-item ${a.la_dung ? 'correct' : ''}" 
                                 onclick="toggleCorrectAnswer(${index}, ${aIndex})">
                                <span class="answer-letter">${a.ky_tu}</span>
                                <span class="answer-text">${a.noi_dung}</span>
                                ${a.la_dung ? '<span class="correct-badge">Đúng</span>' : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Toggle correct answer
        function toggleCorrectAnswer(questionIndex, answerIndex) {
            // Unmark all answers for this question
            questions[questionIndex].dap_an.forEach(a => a.la_dung = 0);
            // Mark selected answer as correct
            questions[questionIndex].dap_an[answerIndex].la_dung = 1;
            renderQuestions();
        }

        // Delete question
        function deleteQuestion(index) {
            if (confirm('Xóa câu hỏi này?')) {
                questions.splice(index, 1);
                renderQuestions();
            }
        }

        // Save exam
        async function saveExam() {
            const title = document.getElementById('examTitle').value.trim();
            const deadline = document.getElementById('examDeadline').value;
            const showResult = document.querySelector('input[name="showResult"]:checked').value;
            const requireLogin = document.querySelector('input[name="requireLogin"]:checked').value;

            if (!title) {
                alert('Vui lòng nhập tên đề thi');
                return;
            }

            if (questions.length === 0) {
                alert('Vui lòng thêm câu hỏi');
                return;
            }

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = 'Đang lưu...';

            try {
                // Create exam if not exists
                if (!ma_de) {
                    const createResponse = await fetch('/vinhzota/controllers/exam_controller.php?action=create', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            ten_de: title,
                            thoi_gian_nap: deadline || null,
                            cho_xem_ket_qua: showResult,
                            yeu_cau_dang_nhap: requireLogin
                        })
                    });

                    const createResult = await createResponse.json();

                    if (createResult.success) {
                        ma_de = createResult.data.ma_de;
                        ma_code = createResult.data.ma_code;
                        document.getElementById('examCode').value = ma_code;
                    } else {
                        throw new Error(createResult.message);
                    }
                }

                // Save questions
                const saveResponse = await fetch('/vinhzota/controllers/exam_controller.php?action=save_questions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ma_de,
                        questions
                    })
                });

                const saveResult = await saveResponse.json();

                if (saveResult.success) {
                    alert('Lưu đề thi thành công!');
                    // Redirect to share page
                    window.location.href = `gui_bai.html?code=${ma_code}`;
                } else {
                    throw new Error(saveResult.message);
                }
            } catch (error) {
                console.error('Save error:', error);
                alert('Lỗi: ' + error.message);
                saveBtn.disabled = false;
                saveBtn.textContent = '💾 Lưu và chia sẻ';
            }
        }
    </script>
</body>
</html>
