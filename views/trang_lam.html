<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài Thi Trắc Nghiệm</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    color: #222;
    font-size: 14px;
  }

  /* ── TOP NAV ── */
  .top-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 0 20px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-left { display: flex; align-items: center; gap: 6px; }
  .btn-back {
    display: flex; align-items: center; gap: 5px;
    background: none; border: none; cursor: pointer;
    color: #555; font-size: 13px; padding: 6px 10px;
    border-radius: 6px;
  }
  .btn-back:hover { background: #f5f5f5; }
  .btn-back svg { width: 16px; height: 16px; }

  .nav-center {
    position: absolute; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
  }
  .student-name { font-size: 13px; color: #555; }
  .chevron-btn {
    background: none; border: none; cursor: pointer;
    color: #777; display: flex; align-items: center;
  }

  .nav-right { display: flex; align-items: center; gap: 14px; }
  .time-badge {
    display: flex; align-items: center; gap: 5px;
    color: #555; font-size: 13px;
  }
  .time-badge svg { width: 15px; height: 15px; color: #999; }

  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: #555; padding: 6px; border-radius: 6px;
    display: flex; align-items: center;
  }
  .icon-btn:hover { background: #f0f0f0; }
  .icon-btn svg { width: 18px; height: 18px; }

  .btn-submit {
    background: #1a6ef5; color: #fff;
    border: none; border-radius: 8px;
    padding: 8px 18px; font-size: 13px;
    font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-submit:hover { background: #155de0; }
  .btn-submit svg { width: 15px; height: 15px; }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    min-height: calc(100vh - 52px);
  }

  /* ── MAIN CONTENT ── */
  .main {
    flex: 1;
    padding: 24px 28px;
    overflow-y: auto;
    max-height: calc(100vh - 52px);
  }

  .chapter-title {
    font-size: 13.5px;
    font-weight: 600;
    color: #333;
    margin-bottom: 18px;
  }

  /* ── QUESTION CARD ── */
  .question-card {
    background: #fff;
    border-radius: 10px;
    padding: 20px 24px 24px;
    margin-bottom: 20px;
    border: 1px solid #e8e8e8;
  }

  .question-header {
    font-weight: 600;
    margin-bottom: 6px;
    font-size: 14px;
  }

  .question-text {
    color: #333;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 1.5;
  }

  .pick-label {
    font-size: 12px;
    color: #888;
    text-align: center;
    margin-bottom: 16px;
    display: block;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }

  .option-radio {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2px solid #ccc;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: #555;
    flex-shrink: 0;
    transition: all .15s;
  }

  .option:hover .option-radio {
    border-color: #1a6ef5;
    color: #1a6ef5;
  }

  .option.selected .option-radio {
    background: #1a6ef5;
    border-color: #1a6ef5;
    color: #fff;
  }

  .option-label {
    border: 1px solid #d8d8d8;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13.5px;
    color: #333;
    background: #fff;
    cursor: pointer;
    transition: all .15s;
    flex: 1;
  }

  .option:hover .option-label {
    border-color: #1a6ef5;
    background: #f0f5ff;
  }

  .option.selected .option-label {
    border-color: #1a6ef5;
    background: #f0f5ff;
    color: #1a6ef5;
    font-weight: 500;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 320px;
    background: #fff;
    border-left: 1px solid #e0e0e0;
    padding: 20px 16px;
    overflow-y: auto;
    max-height: calc(100vh - 52px);
    flex-shrink: 0;
  }

  .sidebar-title {
    font-size: 14px;
    font-weight: 700;
    color: #222;
    margin-bottom: 14px;
  }

  .group-label {
    font-size: 12.5px;
    font-weight: 600;
    color: #444;
    margin-bottom: 10px;
    margin-top: 16px;
  }

  .group-label:first-of-type { margin-top: 0; }

  .num-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 4px;
  }

  .num-btn {
    height: 34px;
    border-radius: 6px;
    border: 1px solid #e0e0e0;
    background: #fff;
    font-size: 12.5px;
    color: #444;
    cursor: pointer;
    font-weight: 500;
    transition: all .12s;
  }

  .num-btn:hover {
    border-color: #1a6ef5;
    color: #1a6ef5;
    background: #f0f5ff;
  }

  .num-btn.answered {
    background: #1a6ef5;
    border-color: #1a6ef5;
    color: #fff;
  }

  .num-btn.current {
    border-color: #f5a623;
    background: #fff8ec;
    color: #e08c00;
    font-weight: 700;
  }
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="top-nav">
  <div class="nav-left">
    <button class="btn-back" onclick="window.history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Quay lại
    </button>
  </div>

  <div class="nav-center">
    <span class="student-name" id="studentNameDisplay">Thí sinh: Chưa đăng nhập</span>
    <button class="chevron-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </div>

  <div class="nav-right">
    <div class="time-badge" id="timerBadge" style="display: none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="timerText">Không giới hạn</span>
    </div>
    <button class="icon-btn" title="Tìm kiếm">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button class="icon-btn" title="Trợ giúp">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <button class="icon-btn" title="Danh sách câu hỏi">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </button>
    <button class="btn-submit" onclick="showSubmitModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      Nộp bài
    </button>
  </div>
</nav>

<!-- LAYOUT -->
<div class="layout">

  <!-- MAIN -->
  <main class="main" id="mainContent">
    <!-- Questions will be injected here -->
  </main>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">Danh sách câu hỏi</div>

    <div class="group-label">Tất cả câu hỏi</div>
    <div class="num-grid" id="questionGrid"></div>
  </aside>

</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const ma_code = urlParams.get('code');

// Store code in sessionStorage for later use
if (ma_code) {
    sessionStorage.setItem('exam_code', ma_code);
}

let exam = null;
let questions = [];
let answers = {};
let currentUser = null;
let timerInterval = null;
let timeRemaining = null;

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    if (!ma_code) {
        alert('Không tìm thấy mã đề thi');
        window.location.href = 'dang_nhap.html';
        return;
    }
    loadExam();
});

// Load exam
async function loadExam() {
    try {
        // Check auth
        const authResponse = await fetch('/vinhzota/controllers/auth_controller.php?action=check_auth');
        const authResult = await authResponse.json();

        if (authResult.authenticated) {
            currentUser = authResult.user;
            document.getElementById('studentNameDisplay').textContent = `Thí sinh: ${currentUser.full_name}`;
        }

        // Get exam info
        const examResponse = await fetch(`/vinhzota/controllers/exam_controller.php?action=get_by_code&code=${ma_code}`);
        const examResult = await examResponse.json();

        if (!examResult.success) {
            alert('Không tìm thấy đề thi');
            window.location.href = 'dang_nhap.html';
            return;
        }

        exam = examResult.data;
        document.title = exam.ten_de;
        console.log('Exam loaded:', exam);
        console.log('Exam ma_code:', exam.ma_code);

        // Check if login required
        if (exam.yeu_cau_dang_nhap && !currentUser) {
            alert('Vui lòng đăng nhập để làm bài');
            window.location.href = 'dang_nhap.html';
            return;
        }

        // Load questions
        await loadQuestions();

    } catch (error) {
        console.error('Load error:', error);
        alert('Có lỗi xảy ra');
    }
}

// Load questions
async function loadQuestions() {
    try {
        const response = await fetch(`/vinhzota/controllers/submission_controller.php?action=get_questions&ma_de=${exam.ma_de}`);
        const result = await response.json();

        if (result.success) {
            questions = result.data;
            renderQuestions();
            renderGrid();
            startTimer();
        } else {
            alert('Không tải được câu hỏi');
        }
    } catch (error) {
        console.error('Load questions error:', error);
        alert('Có lỗi xảy ra');
    }
}

// Render questions
function renderQuestions() {
    const container = document.getElementById('mainContent');
    container.innerHTML = '';

    questions.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `q${q.ma_cau_hoi}`;
        card.innerHTML = `
            <div class="question-header">Câu ${index + 1}</div>
            <div class="question-text">${q.noi_dung}</div>
            <span class="pick-label">Chọn một đáp án đúng</span>
            <div class="options">
                ${q.dap_an.map((a, i) => {
                    const letter = a.ky_tu;
                    return `
                        <div class="option" data-q="${q.ma_cau_hoi}" data-i="${i}" onclick="selectOption(${q.ma_cau_hoi},${i})">
                            <div class="option-radio">${letter}</div>
                            <div class="option-label">${a.noi_dung}</div>
                        </div>`;
                }).join('')}
            </div>
        `;
        container.appendChild(card);
    });
}

// Render grid
function renderGrid() {
    const grid = document.getElementById('questionGrid');
    grid.innerHTML = '';
    
    questions.forEach((q, index) => {
        const btn = document.createElement('button');
        btn.className = 'num-btn';
        btn.textContent = String(index + 1).padStart(2, '0');
        btn.id = `btn_${q.ma_cau_hoi}`;
        btn.onclick = () => scrollToQuestion(q.ma_cau_hoi);
        grid.appendChild(btn);
    });
}

// Select option
function selectOption(qId, idx) {
    // Find the question and get the letter (ky_tu) of the selected answer
    const question = questions.find(q => q.ma_cau_hoi == qId);
    if (question && question.dap_an[idx]) {
        answers[qId] = question.dap_an[idx].ky_tu;
    }
    
    // Update option visuals
    document.querySelectorAll(`.option[data-q="${qId}"]`).forEach((el, i) => {
        el.classList.toggle('selected', i === idx);
    });
    
    updateGrid();
}

// Update grid
function updateGrid() {
    questions.forEach((q, index) => {
        const btn = document.getElementById(`btn_${q.ma_cau_hoi}`);
        if (btn) {
            btn.classList.toggle('answered', answers[q.ma_cau_hoi] !== undefined);
        }
    });
}

// Scroll to question
function scrollToQuestion(qId) {
    const el = document.getElementById(`q${qId}`);
    if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

// Timer
function startTimer() {
    if (exam.thoi_gian_nap) {
        const deadline = new Date(exam.thoi_gian_nap);
        const now = new Date();

        if (now > deadline) {
            alert('Đề thi đã hết hạn');
            window.location.href = 'dang_nhap.html';
            return;
        }

        timeRemaining = deadline - now;
        document.getElementById('timerBadge').style.display = 'flex';

        updateTimer();
        timerInterval = setInterval(updateTimer, 1000);
    }
}

function updateTimer() {
    if (timeRemaining <= 0) {
        clearInterval(timerInterval);
        alert('Hết giờ làm bài!');
        submitExam();
        return;
    }

    timeRemaining -= 1000;

    const hours = Math.floor(timeRemaining / (1000 * 60 * 60));
    const minutes = Math.floor((timeRemaining % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((timeRemaining % (1000 * 60)) / 1000);

    const timerText = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    document.getElementById('timerText').textContent = timerText;

    // Warning when less than 5 minutes
    if (timeRemaining < 5 * 60 * 1000) {
        document.getElementById('timerBadge').style.color = '#dc2626';
    }
}

// Submit
function showSubmitModal() {
    const answeredCount = Object.keys(answers).length;
    const total = questions.length;
    
    if (!confirm(`Bạn đã trả lời ${answeredCount}/${total} câu hỏi.\nBạn có chắc chắn muốn nộp bài?`)) {
        return;
    }
    
    submitExam();
}

async function submitExam() {
    try {
        const response = await fetch('/vinhzota/controllers/submission_controller.php?action=submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                ma_de: exam.ma_de,
                answers,
                student_info: currentUser || {}
            })
        });

        const result = await response.json();

        if (result.success) {
            // Get code from sessionStorage to ensure it's available
            const code = sessionStorage.getItem('exam_code') || exam.ma_code;
            console.log('Submit result:', result);
            console.log('Redirect code:', code);
            alert('Nộp bài thành công! Điểm: ' + result.score);
            window.location.href = 'ket_qua.html?ma_bai_lam=' + result.ma_bai_lam + '&code=' + code;
        } else {
            alert('Nộp bài thất bại: ' + result.message);
        }
    } catch (error) {
        console.error('Submit error:', error);
        alert('Có lỗi xảy ra khi nộp bài');
    }
}
</script>
</body>
</html>
