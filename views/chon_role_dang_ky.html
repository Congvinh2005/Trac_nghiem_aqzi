<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chọn vai trò - Vinhzota</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            text-decoration: none;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 50px 40px;
            width: 100%;
            max-width: 600px;
            margin-top: 60px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-bottom: 40px;
        }

        .role-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .role-card {
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }

        .role-input {
            display: none;
        }

        .role-card-content {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s;
            background: white;
        }

        .role-card input:checked ~ .role-card-content {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .role-icon {
            font-size: 60px;
            margin-bottom: 15px;
            display: inline-block;
        }

        .role-name {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .role-description {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }

        .role-card input:checked ~ .role-card-content .role-name {
            color: #667eea;
        }

        .checkmark {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 24px;
            height: 24px;
            border: 2px solid #e5e7eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.3s;
            background: white;
            opacity: 0;
        }

        .role-card input:checked ~ .checkmark {
            border-color: #667eea;
            background: #667eea;
            color: white;
            opacity: 1;
        }

        .btn-next {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-next:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #764ba2;
        }

        @media (max-width: 600px) {
            .header {
                padding: 15px 20px;
            }

            .container {
                padding: 30px 20px;
                margin-top: 70px;
            }

            .title {
                font-size: 24px;
            }

            .role-selection {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a href="dang_nhap.html" class="logo">
            <div class="logo-icon">V</div>
            <span>Vinhzota</span>
        </a>
    </div>

    <!-- Container -->
    <div class="container">
        <h1 class="title">Chọn vai trò</h1>
        <p class="subtitle">Bạn là ai? Chọn vai trò phù hợp với bạn</p>

        <form id="roleForm">
            <div class="role-selection">
                <!-- Student Role -->
                <label class="role-card">
                    <input type="radio" name="role" value="student" class="role-input" required>
                    <div class="role-card-content">
                        <div class="role-icon">🎓</div>
                        <div class="role-name">Học sinh</div>
                        <div class="role-description">Làm bài tập, thi trực tuyến</div>
                    </div>
                    <div class="checkmark">✓</div>
                </label>

                <!-- Teacher Role -->
                <label class="role-card">
                    <input type="radio" name="role" value="teacher" class="role-input" required>
                    <div class="role-card-content">
                        <div class="role-icon">👨‍🏫</div>
                        <div class="role-name">Giáo viên</div>
                        <div class="role-description">Tạo đề thi, quản lý lớp học</div>
                    </div>
                    <div class="checkmark">✓</div>
                </label>
            </div>

            <button type="submit" class="btn-next" id="nextBtn" disabled>
                Tiếp tục →
            </button>
        </form>

        <div class="back-link">
            <a href="dang_nhap.html">← Quay lại đăng nhập</a>
        </div>
    </div>

    <script>
        const roleForm = document.getElementById('roleForm');
        const nextBtn = document.getElementById('nextBtn');
        const roleInputs = document.querySelectorAll('input[name="role"]');

        // Enable button when role is selected
        roleInputs.forEach(input => {
            input.addEventListener('change', () => {
                nextBtn.disabled = false;
            });
        });

        // Handle form submission
        roleForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const selectedRole = document.querySelector('input[name="role"]:checked').value;
            
            // Redirect to registration page with role
            window.location.href = `dang_ky.html?role=${selectedRole}`;
        });

        // Logo click
        document.querySelector('.logo').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'dang_nhap.html';
        });
    </script>
</body>
</html>
