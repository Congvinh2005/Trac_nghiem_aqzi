<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả bài thi - Vinhzota</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .score-circle {
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.5s ease-out 0.2s both;
            position: relative;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        .score-circle.excellent {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .score-circle.good {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .score-circle.average {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .score-circle.poor {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .score-number {
            font-size: 56px;
            font-weight: 700;
            color: white;
            line-height: 1;
        }

        .score-label {
            font-size: 14px;
            color: rgba(255,255,255,0.9);
            margin-top: 5px;
        }

        .score-icon {
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 50px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 15px;
            color: #666;
            margin-bottom: 30px;
        }

        .student-info {
            background: #f9fafb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
            font-weight: 500;
        }

        .info-value {
            color: #333;
            font-weight: 600;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-item {
            background: #f9fafb;
            border-radius: 10px;
            padding: 20px 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-number.correct {
            color: #10b981;
        }

        .stat-number.wrong {
            color: #ef4444;
        }

        .stat-number.skipped {
            color: #6b7280;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            font-weight: 600;
        }

        .message {
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 15px;
            line-height: 1.6;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .message.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .title {
                font-size: 24px;
            }

            .score-circle {
                width: 140px;
                height: 140px;
            }

            .score-number {
                font-size: 42px;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="score-circle" id="scoreCircle">
            <span class="score-icon" id="scoreIcon">🎉</span>
            <span class="score-number" id="scoreNumber">0</span>
            <span class="score-label">Điểm số</span>
        </div>

        <h1 class="title" id="resultTitle">Hoàn thành!</h1>
        <p class="subtitle" id="resultSubtitle">Bài thi của bạn đã được nộp</p>

        <div class="student-info" id="studentInfo">
            <div class="info-row">
                <span class="info-label">Họ tên:</span>
                <span class="info-value" id="studentName">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Email:</span>
                <span class="info-value" id="studentEmail">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Thời gian nộp:</span>
                <span class="info-value" id="submitTime">-</span>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number correct" id="correctCount">0</div>
                <div class="stat-label">Đúng</div>
            </div>
            <div class="stat-item">
                <div class="stat-number wrong" id="wrongCount">0</div>
                <div class="stat-label">Sai</div>
            </div>
            <div class="stat-item">
                <div class="stat-number skipped" id="totalCount">0</div>
                <div class="stat-label">Tổng câu</div>
            </div>
        </div>

        <div class="message" id="resultMessage">
            <!-- Message will be inserted here -->
        </div>

        <div class="buttons">
            <button class="btn btn-secondary" onclick="window.location.href='dang_nhap.html'">
                ← Quay lại
            </button>
            <a href="#" class="btn btn-outline" id="reviewBtn" style="display: none;">
                📝 Xem lại đáp án
            </a>
            <button class="btn btn-primary" onclick="window.location.href='dang_nhap.html'">
                Tiếp tục học tập
            </button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const ma_bai_lam = urlParams.get('ma_bai_lam');
        const cho_xem_ket_qua = urlParams.get('cho_xem_ket_qua');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (ma_bai_lam) {
                loadResult();
            } else {
                showDefaultResult();
            }
        });

        // Load result
        async function loadResult() {
            try {
                const response = await fetch(`/vinhzota/controllers/submission_controller.php?action=get_submission_detail&ma_bai_lam=${ma_bai_lam}`);
                const result = await response.json();

                if (result.success) {
                    displayResult(result.data);
                } else {
                    showDefaultResult();
                }
            } catch (error) {
                console.error('Load error:', error);
                showDefaultResult();
            }
        }

        // Display result
        function displayResult(submission) {
            // Student info
            document.getElementById('studentName').textContent = submission.ten_hoc_sinh || 'Ẩn danh';
            document.getElementById('studentEmail').textContent = submission.email || '-';
            document.getElementById('submitTime').textContent = formatDateTime(submission.thoi_gian_nop);

            // Score
            const score = parseFloat(submission.diem) || 0;
            document.getElementById('scoreNumber').textContent = score.toFixed(1);

            // Calculate stats
            let answers = {};
            try {
                answers = JSON.parse(submission.danh_sach_dap_an || '{}');
            } catch (e) {}

            const totalQuestions = Object.keys(answers).length;
            const correctAnswers = Math.round((score / 10) * totalQuestions);
            const wrongAnswers = totalQuestions - correctAnswers;

            document.getElementById('correctCount').textContent = correctAnswers;
            document.getElementById('wrongCount').textContent = wrongAnswers;
            document.getElementById('totalCount').textContent = totalQuestions;

            // Style based on score
            const circle = document.getElementById('scoreCircle');
            const icon = document.getElementById('scoreIcon');
            const title = document.getElementById('resultTitle');
            const subtitle = document.getElementById('resultSubtitle');
            const message = document.getElementById('resultMessage');

            circle.className = 'score-circle';

            if (score >= 8) {
                circle.classList.add('excellent');
                icon.textContent = '🏆';
                title.textContent = 'Xuất sắc!';
                subtitle.textContent = 'Làm rất tốt, phát huy nhé!';
                message.className = 'message success';
                message.innerHTML = '🌟 <strong>Tuyệt vời!</strong> Bạn đã hoàn thành bài thi với kết quả rất cao. Tiếp tục phát huy!';
            } else if (score >= 6.5) {
                circle.classList.add('good');
                icon.textContent = '👏';
                title.textContent = 'Làm tốt!';
                subtitle.textContent = 'Kết quả khá tốt';
                message.className = 'message success';
                message.innerHTML = '👍 <strong>Tốt lắm!</strong> Bạn đã hoàn thành bài thi. Cố gắng hơn nữa nhé!';
            } else if (score >= 5) {
                circle.classList.add('average');
                icon.textContent = '📚';
                title.textContent = 'Hoàn thành';
                subtitle.textContent = 'Cần cố gắng hơn';
                message.className = 'message info';
                message.innerHTML = '💪 <strong>Cố gắng!</strong> Hãy ôn tập thêm để đạt kết quả cao hơn trong lần sau.';
            } else {
                circle.classList.add('poor');
                icon.textContent = '📖';
                title.textContent = 'Cần cải thiện';
                subtitle.textContent = 'Đừng nản lòng!';
                message.className = 'message info';
                message.innerHTML = '🌱 <strong>Không sao!</strong> Thất bại là mẹ thành công. Hãy ôn tập kỹ hơn và thử lại nhé!';
            }

            // Show review button if allowed
            if (cho_xem_ket_qua === '1' || cho_xem_ket_qua === 'yes') {
                document.getElementById('reviewBtn').style.display = 'inline-block';
                document.getElementById('reviewBtn').href = `xem_dap_an.html?ma_bai_lam=${ma_bai_lam}`;
            }
        }

        // Show default result (when submitted without login)
        function showDefaultResult() {
            document.getElementById('scoreCircle').classList.add('good');
            document.getElementById('scoreIcon').textContent = '✓';
            document.getElementById('scoreNumber').textContent = '--';
            document.getElementById('resultTitle').textContent = 'Đã nộp bài!';
            document.getElementById('resultSubtitle').textContent = 'Bài làm của bạn đã được ghi nhận';
            
            document.getElementById('studentInfo').style.display = 'none';
            
            document.getElementById('resultMessage').className = 'message info';
            document.getElementById('resultMessage').innerHTML = '📬 <strong>Bài làm đã được nộp!</strong><br>Giáo viên sẽ xem và chấm điểm sau.';
            
            document.getElementById('stats').style.display = 'none';
        }

        // Format datetime
        function formatDateTime(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('vi-VN', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
