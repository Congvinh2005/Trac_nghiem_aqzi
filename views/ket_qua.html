<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả bài làm - Vinhzota</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-blue: #1a44a0;
            --bg-color: #f0f4f9;
            --white: #ffffff;
            --text-dark: #333;
            --text-muted: #666;
            --premium-purple: #7c4dff;
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 80px;
            background-color: var(--primary-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            color: white;
            flex-shrink: 0;
        }

        .logo {
            font-size: 24px;
            margin-bottom: 40px;
            cursor: pointer;
        }

        .menu {
            flex-grow: 1;
        }

        .menu-item {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 20px;
            transition: 0.3s;
            color: rgba(255,255,255,0.6);
        }

        .menu-item.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .settings {
            cursor: pointer;
            font-size: 20px;
            padding-bottom: 20px;
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            padding: 20px 40px;
            overflow-y: auto;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-back {
            border: none;
            background: none;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-premium {
            background-color: var(--premium-purple);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .flag img {
            width: 25px;
            border-radius: 3px;
        }

        .notification {
            font-size: 20px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info {
            text-align: right;
        }

        .user-name {
            display: block;
            font-weight: bold;
            font-size: 14px;
        }

        .user-role {
            font-size: 12px;
            color: var(--text-muted);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--white);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow);
        }

        /* Result Card */
        .result-card {
            text-align: center;
        }

        .result-card h2 {
            font-size: 22px;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .score-display {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .score-value {
            font-size: 40px;
            font-weight: 800;
            color: var(--primary-blue);
        }

        .exam-name {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-style: italic;
        }

        .stats-list {
            text-align: left;
            margin-bottom: 30px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .stat-item i {
            margin-right: 8px;
            width: 16px;
        }

        .stat-val {
            color: var(--text-dark);
            font-weight: 600;
        }

        .btn-view-answers {
            width: 100%;
            padding: 14px;
            border: 1.5px solid var(--primary-blue);
            background: none;
            color: var(--primary-blue);
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-view-answers:hover {
            background-color: var(--primary-blue);
            color: white;
        }

        /* Leaderboard Styling */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .btn-copy {
            background: #eef2ff;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: var(--primary-blue);
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .rank-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid #edf2f7;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: transform 0.2s;
        }

        .rank-item:hover {
            transform: scale(1.02);
        }

        .rank-num {
            width: 30px;
            font-weight: bold;
            color: var(--text-muted);
        }

        .rank-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #cbd5e0;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 15px;
            font-weight: bold;
            object-fit: cover;
        }

        .rank-info {
            flex-grow: 1;
        }

        .rank-info .name {
            font-weight: bold;
            font-size: 15px;
        }

        .rank-info .pts {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Top 1 Special */
        .rank-1 {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .rank-1 .rank-num, .rank-1 .pts {
            color: rgba(255,255,255,0.8);
        }

        .gold { color: #ffd700; }
        .silver { color: #cbd5e0; }
        .bronze { color: #ed8936; }

        .view-more {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo"><i class="fa-solid fa-shapes"></i></div>
            <nav class="menu">
                <div class="menu-item active" title="Dashboard"><i class="fa-solid fa-layer-group"></i></div>
                <div class="menu-item" title="Courses"><i class="fa-solid fa-book-bookmark"></i></div>
                <div class="menu-item" title="Statistics"><i class="fa-solid fa-chart-simple"></i></div>
            </nav>
            <div class="settings"><i class="fa-solid fa-gear"></i></div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <button class="btn-back" onclick="goBack()">
                    <i class="fa-solid fa-chevron-left"></i> Quay lại
                </button>
                <div class="header-right">
                    <button class="btn-premium"><i class="fa-solid fa-gem"></i> Bỏ quảng cáo</button>
                    <div class="flag"><img src="https://flagcdn.com/w40/vn.png" alt="VN"></div>
                    <div class="notification"><i class="fa-regular fa-bell"></i></div>
                    <div class="user-profile">
                        <div class="user-info">
                            <span class="user-name" id="headerUserName">Thí sinh</span>
                            <span class="user-role" id="headerUserRole">Học sinh</span>
                        </div>
                        <img src="https://i.pravatar.cc/150?u=default" alt="Avatar" class="avatar" id="headerAvatar">
                    </div>
                </div>
            </header>

            <div class="dashboard-grid">
                <section class="card result-card">
                    <h2 id="resultTitle">Bài làm của bạn đã được gửi đi</h2>
                    <div class="score-display">
                        Điểm của bạn: <span class="score-value" id="userScore">--</span>
                    </div>
                    <p class="exam-name" id="examName">Đang tải...</p>

                    <div class="stats-list">
                        <div class="stat-item">
                            <span><i class="fa-regular fa-user"></i> Thí sinh</span>
                            <span class="stat-val" id="studentName">-</span>
                        </div>
                        <div class="stat-item">
                            <span><i class="fa-regular fa-clock"></i> Thời gian nộp</span>
                            <span class="stat-val" id="submitTime">-</span>
                        </div>
                        <div class="stat-item">
                            <span><i class="fa-regular fa-hourglass"></i> Thời gian làm bài</span>
                            <span class="stat-val" id="timeSpent">-</span>
                        </div>
                        <div class="stat-item">
                            <span><i class="fa-regular fa-circle-check"></i> Số câu đúng</span>
                            <span class="stat-val" id="correctCount">-/-</span>
                        </div>
                    </div>

                    <button class="btn-view-answers" id="reviewBtn" onclick="alert('Đang tải đáp án chi tiết...')" style="display: none;">
                        Xem đáp án <i class="fa-solid fa-chevron-right" style="margin-left:5px"></i>
                    </button>
                </section>

                <section class="card leaderboard-card">
                    <div class="card-header">
                        <h3><i class="fa-solid fa-trophy" style="color: #f1c40f;"></i> Bảng xếp hạng</h3>
                        <button class="btn-copy" onclick="copyRank()">
                            <i class="fa-regular fa-copy"></i> Sao chép
                        </button>
                    </div>

                    <div class="leaderboard-list" id="leaderboardList">
                        <!-- Leaderboard will be loaded here -->
                        <div class="rank-item rank-1">
                            <div class="rank-num">1</div>
                            <div class="rank-avatar" style="background: #fff; color: #a855f7;">A</div>
                            <div class="rank-info">
                                <p class="name">abc</p>
                                <p class="pts">353 điểm</p>
                            </div>
                            <div class="rank-badge gold"><i class="fa-solid fa-crown"></i></div>
                        </div>

                        <div class="rank-item">
                            <div class="rank-num">2</div>
                            <img src="https://i.pravatar.cc/150?u=vinh" class="rank-avatar">
                            <div class="rank-info">
                                <p class="name">Công Vinh (Bạn)</p>
                                <p class="pts">346 điểm</p>
                            </div>
                            <div class="rank-badge silver"><i class="fa-solid fa-crown"></i></div>
                        </div>

                        <div class="rank-item">
                            <div class="rank-num">3</div>
                            <img src="https://i.pravatar.cc/150?u=dan" class="rank-avatar">
                            <div class="rank-info">
                                <p class="name">Dân</p>
                                <p class="pts">1 điểm</p>
                            </div>
                            <div class="rank-badge bronze"><i class="fa-solid fa-crown"></i></div>
                        </div>
                    </div>

                    <a href="javascript:void(0)" class="view-more" onclick="alert('Tính năng đang phát triển!')">
                        Xem thêm <i class="fa-solid fa-chevron-right"></i>
                    </a>
                </section>
            </div>
        </main>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const ma_bai_lam = urlParams.get('ma_bai_lam');
        const cho_xem_ket_qua = urlParams.get('cho_xem_ket_qua');
        const code = urlParams.get('code');

        // Store code in sessionStorage for back navigation
        if (code) {
            sessionStorage.setItem('back_code', code);
        }

        let submissionData = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (ma_bai_lam) {
                loadResult();
            } else {
                showDefaultResult();
            }
        });

        // Load result
        async function loadResult() {
            try {
                const response = await fetch(API.SUBMISSION + '?action=get_submission_detail&ma_bai_lam=' + ma_bai_lam);
                const result = await response.json();

                if (result.success) {
                    submissionData = result.data;
                    displayResult(result.data);
                } else {
                    showDefaultResult();
                }
            } catch (error) {
                console.error('Load error:', error);
                showDefaultResult();
            }
        }

        // Display result
        function displayResult(submission) {
            // Update header
            const studentName = submission.ten_hoc_sinh || 'Ẩn danh';
            document.getElementById('headerUserName').textContent = studentName;
            document.getElementById('headerUserRole').textContent = 'Thí sinh';
            document.getElementById('headerAvatar').src = `https://i.pravatar.cc/150?u=${studentName}`;

            // Update result card
            document.getElementById('studentName').textContent = studentName;
            document.getElementById('submitTime').textContent = formatDateTime(submission.thoi_gian_nop);
            
            const score = parseFloat(submission.diem) || 0;
            document.getElementById('userScore').textContent = score.toFixed(1);
            document.getElementById('examName').textContent = 'Bài thi trắc nghiệm';

            // Calculate stats
            let answers = {};
            try {
                answers = JSON.parse(submission.danh_sach_dap_an || '{}');
            } catch (e) {}

            const totalQuestions = Object.keys(answers).length;
            const correctAnswers = Math.round((score / 10) * totalQuestions);
            
            document.getElementById('correctCount').textContent = `${correctAnswers}/${totalQuestions}`;

            // Calculate time spent
            const timeSpent = calculateTimeSpent(answers);
            document.getElementById('timeSpent').textContent = timeSpent;

            // Show review button if allowed
            if (cho_xem_ket_qua === '1' || cho_xem_ket_qua === 'yes' || cho_xem_ket_qua === 'true') {
                const reviewBtn = document.getElementById('reviewBtn');
                reviewBtn.style.display = 'block';
                reviewBtn.onclick = () => {
                    window.location.href = `xem_dap_an.html?ma_bai_lam=${ma_bai_lam}`;
                };
            } else {
                // For testing: show button anyway (remove this in production)
                const reviewBtn = document.getElementById('reviewBtn');
                reviewBtn.style.display = 'block';
                reviewBtn.onclick = () => {
                    window.location.href = `xem_dap_an.html?ma_bai_lam=${ma_bai_lam}`;
                };
            }

            // Update title based on score
            const resultTitle = document.getElementById('resultTitle');
            if (score >= 8) {
                resultTitle.textContent = '🎉 Xuất sắc! Làm rất tốt!';
            } else if (score >= 6.5) {
                resultTitle.textContent = '👏 Làm tốt!';
            } else if (score >= 5) {
                resultTitle.textContent = '📚 Hoàn thành!';
            } else {
                resultTitle.textContent = '📖 Cần cải thiện';
            }

            // Load leaderboard
            loadLeaderboard(submission.ma_de, submission.ma_bai_lam, score, studentName);
        }

        // Show default result
        function showDefaultResult() {
            document.getElementById('resultTitle').textContent = '📬 Bài làm đã được nộp!';
            document.getElementById('userScore').textContent = '--';
            document.getElementById('examName').textContent = 'Đang chờ chấm...';
            document.getElementById('studentName').textContent = 'Ẩn danh';
            document.getElementById('submitTime').textContent = '-';
            document.getElementById('correctCount').textContent = '-/-';
        }

        // Load leaderboard
        async function loadLeaderboard(ma_de, currentMaBaiLam, currentScore, currentStudentName) {
            try {
                const response = await fetch(API.SUBMISSION + '?action=get_submissions&ma_de=' + ma_de);
                const result = await response.json();

                if (result.success && result.data) {
                    const submissions = result.data;
                    
                    // Sort by score descending
                    const sorted = submissions.sort((a, b) => {
                        const scoreA = parseFloat(a.diem) || 0;
                        const scoreB = parseFloat(b.diem) || 0;
                        return scoreB - scoreA;
                    });

                    // Render leaderboard
                    const container = document.getElementById('leaderboardList');
                    container.innerHTML = sorted.slice(0, 10).map((sub, index) => {
                        const score = parseFloat(sub.diem) || 0;
                        const name = sub.ten_hoc_sinh || 'Ẩn danh';
                        const isCurrentUser = sub.ma_bai_lam === currentMaBaiLam;
                        const rankClass = index === 0 ? 'rank-1' : '';
                        const badgeClass = index === 0 ? 'gold' : index === 1 ? 'silver' : index === 2 ? 'bronze' : '';
                        const initials = getInitials(name);
                        const avatarUrl = isCurrentUser ? `https://i.pravatar.cc/150?u=${name}` : `https://i.pravatar.cc/150?u=${name}${index}`;
                        
                        return `
                            <div class="rank-item ${rankClass}" ${isCurrentUser ? 'style="border: 2px solid #1a44a0;"' : ''}>
                                <div class="rank-num">${index + 1}</div>
                                <img src="${avatarUrl}" class="rank-avatar" alt="${name}">
                                <div class="rank-info">
                                    <p class="name">${name} ${isCurrentUser ? '(Bạn)' : ''}</p>
                                    <p class="pts">${score.toFixed(1)} điểm</p>
                                </div>
                                <div class="rank-badge ${badgeClass}"><i class="fa-solid fa-crown"></i></div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (error) {
                console.error('Leaderboard error:', error);
            }
        }

        // Get initials from name
        function getInitials(name) {
            if (!name) return '?';
            const parts = name.split(' ');
            if (parts.length >= 2) {
                return (parts[parts.length - 2][0] + parts[parts.length - 1][0]).toUpperCase();
            }
            return name.charAt(0).toUpperCase();
        }

        // Calculate time spent
        function calculateTimeSpent(answers) {
            // If answers object has thoi_gian_lam_bai property
            if (answers.thoi_gian_lam_bai) {
                const seconds = answers.thoi_gian_lam_bai;
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                
                if (h > 0) {
                    return `${h} giờ ${m} phút`;
                } else if (m > 0) {
                    return `${m} phút ${s} giây`;
                } else {
                    return `${s} giây`;
                }
            }
            return 'N/A';
        }

        // Copy rank function
        function copyRank() {
            const btn = document.querySelector('.btn-copy');
            const originalText = btn.innerHTML;

            btn.innerHTML = '<i class="fa-solid fa-check"></i> Đã sao chép';
            btn.style.backgroundColor = '#d1fae5';
            btn.style.color = '#059669';

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.backgroundColor = '#eef2ff';
                btn.style.color = '#1a44a0';
            }, 2000);
        }

        // Format datetime
        function formatDateTime(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('vi-VN', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Go back to gui_bai.html with code parameter
        function goBack() {
            // Try multiple sources to get the code
            const code = urlParams.get('code') || sessionStorage.getItem('back_code');
            if (code) {
                window.location.href = `gui_bai.html?code=${code}`;
            } else {
                // Fallback: go back to gui_bai without code
                window.location.href = 'gui_bai.html';
            }
        }
    </script>
    <script src="assets/js/app-config.js"></script>
</body>
</html>
