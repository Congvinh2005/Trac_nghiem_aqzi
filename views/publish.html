<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chia sẻ đề thi - Vinhzota</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            animation: scaleIn 0.5s ease-out 0.2s both;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 15px;
            color: #666;
            margin-bottom: 30px;
        }

        .exam-info {
            background: #f9fafb;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: left;
        }

        .exam-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 14px;
        }

        .info-label {
            color: #666;
            font-weight: 500;
        }

        .info-value {
            color: #333;
            font-weight: 600;
        }

        .share-section {
            margin: 30px 0;
        }

        .share-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .share-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .share-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            background: #f9fafb;
            color: #333;
            font-weight: 500;
        }

        .share-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-copy {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-copy.copied {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .code-section {
            background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .code-label {
            font-size: 13px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .code-value {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            letter-spacing: 4px;
            font-family: 'Courier New', monospace;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-secondary {
            padding: 14px 28px;
            background: #f3f4f6;
            color: #666;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-primary {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .title {
                font-size: 24px;
            }

            .share-box {
                flex-direction: column;
            }

            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✓</div>
        <h1 class="title">Tạo đề thi thành công!</h1>
        <p class="subtitle">Đề thi đã được lưu và sẵn sàng chia sẻ</p>

        <div class="exam-info">
            <div class="exam-name" id="examName">Đang tải...</div>
            <div class="info-row">
                <span class="info-label">Mã code:</span>
                <span class="info-value" id="examCode">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Thời hạn nộp:</span>
                <span class="info-value" id="deadline">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Số câu hỏi:</span>
                <span class="info-value" id="questionCount">-</span>
            </div>
        </div>

        <div class="code-section">
            <div class="code-label">Mã đề thi (học sinh nhập để vào thi)</div>
            <div class="code-value" id="examCodeLarge">----</div>
        </div>

        <div class="share-section">
            <div class="share-label">Link làm bài (gửi cho học sinh)</div>
            <div class="share-box">
                <input type="text" class="share-input" id="shareLink" readonly value="">
                <button class="btn-copy" onclick="copyLink()">
                    📋 Copy
                </button>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-secondary" onclick="window.location.href='trang_admin.html'">
                ← Quay lại
            </button>
            <button class="btn-primary" onclick="window.location.href='danh_sach_da_thi.html?ma_de=' + ma_de">
                Xem danh sách bài làm 📊
            </button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const ma_de = urlParams.get('ma_de');
        const ma_code = urlParams.get('ma_code');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (!ma_de || !ma_code) {
                alert('Không tìm thấy thông tin đề thi');
                window.location.href = 'trang_admin.html';
                return;
            }
            loadExamInfo();
        });

        // Load exam info
        async function loadExamInfo() {
            try {
                const response = await fetch(API.EXAM + '?action=get_by_id&ma_de=' + ma_de);
                const result = await response.json();

                if (result.success) {
                    const exam = result.data;
                    displayExamInfo(exam);
                } else {
                    alert('Không tìm thấy đề thi');
                    window.location.href = 'trang_admin.html';
                }
            } catch (error) {
                console.error('Load error:', error);
                alert('Có lỗi xảy ra');
            }
        }

        // Display exam info
        function displayExamInfo(exam) {
            document.getElementById('examName').textContent = 'Đề thi: ' + exam.ten_de;
            document.getElementById('examCode').textContent = exam.ma_code;
            document.getElementById('examCodeLarge').textContent = exam.ma_code;

            // Deadline
            if (exam.thoi_gian_nap) {
                const deadline = new Date(exam.thoi_gian_nap);
                document.getElementById('deadline').textContent = formatDateTime(deadline);
            } else {
                document.getElementById('deadline').textContent = 'Không thời hạn';
            }

            // Load question count
            loadQuestionCount(exam.ma_de);

            // Generate share link
            const shareLink = BASE_URL + '/views/gui_bai.html?code=' + exam.ma_code;
            document.getElementById('shareLink').value = shareLink;
        }

        // Load question count
        async function loadQuestionCount(ma_de) {
            try {
                const response = await fetch(API.SUBMISSION + '?action=get_questions&ma_de=' + ma_de);
                const result = await response.json();

                if (result.success) {
                    document.getElementById('questionCount').textContent = result.data.length + ' câu';
                }
            } catch (error) {
                console.error('Load questions error:', error);
            }
        }

        // Copy link
        function copyLink() {
            const shareInput = document.getElementById('shareLink');
            shareInput.select();
            shareInput.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(shareInput.value);

            const btn = document.querySelector('.btn-copy');
            const originalText = btn.innerHTML;
            btn.innerHTML = '✓ Đã copy';
            btn.classList.add('copied');

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.remove('copied');
            }, 2000);
        }

        // Format datetime
        function formatDateTime(date) {
            return date.toLocaleString('vi-VN', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
    <script src="../assets/js/app-config.js"></script>
</body>
</html>
