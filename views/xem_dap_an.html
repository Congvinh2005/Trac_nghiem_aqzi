<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem đáp án - Vinhzota</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f7fb;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
        }
        .btn-back {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-back:hover {
            background: rgba(255,255,255,0.3);
        }
        .main {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .question-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .question-number {
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
        }
        .question-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-correct {
            background: #d1fae5;
            color: #065f46;
        }
        .status-wrong {
            background: #fee2e2;
            color: #991b1b;
        }
        .status-skipped {
            background: #f3f4f6;
            color: #6b7280;
        }
        .question-content {
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .answers-list {
            display: grid;
            gap: 10px;
        }
        .answer-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid #e5e7eb;
        }
        .answer-item.correct {
            border-color: #10b981;
            background: #d1fae5;
        }
        .answer-item.wrong {
            border-color: #ef4444;
            background: #fee2e2;
        }
        .answer-item.user-selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        .answer-letter {
            width: 32px;
            height: 32px;
            background: #e5e7eb;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #666;
            flex-shrink: 0;
        }
        .answer-item.correct .answer-letter {
            background: #10b981;
            color: white;
        }
        .answer-item.wrong .answer-letter {
            background: #ef4444;
            color: white;
        }
        .answer-text {
            flex: 1;
            font-size: 15px;
            color: #333;
        }
        .answer-badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 10px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .badge-correct {
            background: #10b981;
            color: white;
        }
        .badge-wrong {
            background: #ef4444;
            color: white;
        }
        .badge-user {
            background: #667eea;
            color: white;
        }
        .explanation {
            margin-top: 15px;
            padding: 15px;
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
            border-radius: 6px;
            font-size: 14px;
            color: #92400e;
        }
        .summary {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .summary-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .summary-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .stat {
            text-align: center;
            padding: 15px;
            background: #f9fafb;
            border-radius: 10px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }
        @media (max-width: 768px) {
            .summary-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon">V</div>
            <span>Vinhzota</span>
        </div>
        <button class="btn-back" onclick="window.location.href='ket_qua.html?ma_bai_lam=' + ma_bai_lam">← Quay lại</button>
    </div>

    <div class="main">
        <div class="summary" id="summary">
            <h2 class="summary-title">📊 Tổng kết</h2>
            <div class="summary-stats">
                <div class="stat">
                    <div class="stat-value" id="totalStat">0</div>
                    <div class="stat-label">Tổng câu</div>
                </div>
                <div class="stat">
                    <div class="stat-value" style="color: #10b981;" id="correctStat">0</div>
                    <div class="stat-label">Đúng</div>
                </div>
                <div class="stat">
                    <div class="stat-value" style="color: #ef4444;" id="wrongStat">0</div>
                    <div class="stat-label">Sai</div>
                </div>
                <div class="stat">
                    <div class="stat-value" style="color: #6b7280;" id="scoreStat">0</div>
                    <div class="stat-label">Điểm</div>
                </div>
            </div>
        </div>

        <div id="questionsContainer">
            <!-- Questions will be loaded here -->
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const ma_bai_lam = urlParams.get('ma_bai_lam');
        
        let submission = null;
        let questions = [];
        let userAnswers = {};

        document.addEventListener('DOMContentLoaded', () => {
            if (!ma_bai_lam) {
                alert('Không tìm thấy bài làm');
                window.location.href = 'dang_nhap.html';
                return;
            }
            loadReview();
        });

        async function loadReview() {
            try {
                // Get submission
                const subResponse = await fetch(`/vinhzota/controllers/submission_controller.php?action=get_submission_detail&ma_bai_lam=${ma_bai_lam}`);
                const subResult = await subResponse.json();

                if (!subResult.success) {
                    alert('Không tìm thấy bài làm');
                    return;
                }

                submission = subResult.data;

                // Parse user answers
                try {
                    userAnswers = JSON.parse(submission.danh_sach_dap_an || '{}');
                } catch (e) {}

                // Get exam questions with correct answers
                const qResponse = await fetch(`/vinhzota/controllers/submission_controller.php?action=get_questions&ma_de=${submission.ma_de}`);
                const qResult = await qResponse.json();

                if (qResult.success) {
                    questions = qResult.data;
                    renderReview();
                }
            } catch (error) {
                console.error('Load error:', error);
                alert('Có lỗi xảy ra');
            }
        }

        function renderReview() {
            // Update summary
            const total = questions.length;
            let correct = 0;

            questions.forEach(q => {
                const userAnswer = userAnswers[q.ma_cau_hoi];
                const correctAnswer = q.dap_an.find(a => a.la_dung);
                
                if (userAnswer && correctAnswer && userAnswer.toUpperCase() === correctAnswer.ky_tu) {
                    correct++;
                }
            });

            const wrong = Object.keys(userAnswers).length - correct;
            const skipped = total - Object.keys(userAnswers).length;
            const score = total > 0 ? ((correct / total) * 10).toFixed(2) : 0;

            document.getElementById('totalStat').textContent = total;
            document.getElementById('correctStat').textContent = correct;
            document.getElementById('wrongStat').textContent = wrong;
            document.getElementById('scoreStat').textContent = score;

            // Render questions
            const container = document.getElementById('questionsContainer');
            container.innerHTML = questions.map((q, index) => {
                const userAnswer = userAnswers[q.ma_cau_hoi];
                const correctAnswer = q.dap_an.find(a => a.la_dung);
                const isCorrect = userAnswer && correctAnswer && userAnswer.toUpperCase() === correctAnswer.ky_tu;
                const isSkipped = !userAnswer;

                let statusClass = 'status-correct';
                let statusText = 'Đúng';
                if (isSkipped) {
                    statusClass = 'status-skipped';
                    statusText = 'Bỏ qua';
                } else if (!isCorrect) {
                    statusClass = 'status-wrong';
                    statusText = 'Sai';
                }

                return `
                    <div class="question-card">
                        <div class="question-header">
                            <span class="question-number">Câu ${index + 1}</span>
                            <span class="question-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="question-content">${q.noi_dung}</div>
                        <div class="answers-list">
                            ${q.dap_an.map(a => {
                                const isUserAnswer = userAnswer && userAnswer.toUpperCase() === a.ky_tu;
                                const isCorrectAnswer = a.la_dung;
                                
                                let itemClass = '';
                                let badges = '';
                                
                                if (isCorrectAnswer) {
                                    itemClass = 'correct';
                                    badges = '<span class="answer-badge badge-correct">Đáp án đúng</span>';
                                }
                                if (isUserAnswer && !isCorrectAnswer) {
                                    itemClass = 'wrong';
                                    badges = '<span class="answer-badge badge-wrong">Bạn chọn</span>' + badges;
                                }
                                if (isUserAnswer && isCorrectAnswer) {
                                    itemClass = 'correct user-selected';
                                    badges = '<span class="answer-badge badge-user">Bạn chọn</span>';
                                }

                                return `
                                    <div class="answer-item ${itemClass}">
                                        <div class="answer-letter">${a.ky_tu}</div>
                                        <div class="answer-text">${a.noi_dung}</div>
                                        ${badges}
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
