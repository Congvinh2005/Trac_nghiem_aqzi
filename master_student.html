<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinhzota - Học sinh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --sidebar-bg: #1e3c72;
            --sidebar-w: 70px;
            --topbar-h: 60px;
            --primary: #1e3c72;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 0;
            gap: 6px;
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            z-index: 100;
        }

        .logo {
            width: 40px; height: 40px;
            margin-bottom: 18px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
        }

        .nav-item {
            width: 44px; height: 44px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.55);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.13);
            color: #fff;
        }

        .nav-item.active {
            background: rgba(255,255,255,0.18);
        }

        .nav-spacer { flex: 1; }

        .nav-bottom { margin-top: auto; }

        /* MAIN WRAP */
        .main-wrap {
            margin-left: var(--sidebar-w);
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 100vh;
        }

        /* TOPBAR */
        .topbar {
            height: var(--topbar-h);
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 22px;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .page-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .flag-icon {
            width: 28px; height: 20px;
            border-radius: 3px;
            background: #da251d;
            position: relative;
            overflow: hidden;
        }

        .flag-icon::after {
            content: '⭐';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            font-size: 12px;
            color: #f5d110;
        }

        .notif-btn {
            width: 34px; height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-muted);
        }

        .notif-btn:hover { background: var(--border); }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .user-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
        }

        .user-info .name {
            font-size: 13px;
            font-weight: 600;
        }

        .user-info .role {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* CONTENT IFRAME */
        .content-frame {
            flex: 1;
            border: none;
            width: 100%;
            height: calc(100vh - var(--topbar-h));
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="logo" onclick="loadPage('trang_chu.html')">V</div>
    
    <nav class="nav-items">
        <div class="nav-item active" onclick="loadPage('trang_chu.html')" title="Trang chủ">
            <i class="fas fa-home"></i>
        </div>
        <div class="nav-item" onclick="loadPage('bai_tap.html')" title="Bài tập">
            <i class="fas fa-book"></i>
        </div>
        <div class="nav-item" onclick="loadPage('lop_hoc.html')" title="Lớp học">
            <i class="fas fa-users"></i>
        </div>
        <div class="nav-item" onclick="loadPage('ket_qua.html')" title="Kết quả">
            <i class="fas fa-chart-line"></i>
        </div>
    </nav>

    <div class="nav-spacer"></div>

    <div class="nav-bottom">
        <div class="nav-item" onclick="logout()" title="Đăng xuất">
            <i class="fas fa-sign-out-alt"></i>
        </div>
    </div>
</aside>

<!-- MAIN WRAP -->
<div class="main-wrap">

    <!-- TOPBAR -->
    <header class="topbar">
        <div class="page-title" id="pageTitle">Làm bài thi</div>
        <div class="topbar-right">
            <div class="flag-icon"></div>
            <div class="notif-btn">
                <i class="fas fa-bell"></i>
            </div>
            <div class="user-chip">
                <div class="user-avatar" id="userAvatar">HS</div>
                <div class="user-info">
                    <div class="name" id="userName">Học sinh</div>
                    <div class="role">Học sinh</div>
                </div>
            </div>
        </div>
    </header>

    <!-- CONTENT FRAME -->
    <iframe class="content-frame" id="contentFrame" src="gui_bai.html"></iframe>

</div>

<script>
// Load page into iframe
function loadPage(page) {
    const frame = document.getElementById('contentFrame');
    const pageTitle = document.getElementById('pageTitle');
    
    // Update page title
    const titles = {
        'trang_chu.html': 'Trang chủ',
        'bai_tap.html': 'Bài tập',
        'lop_hoc.html': 'Lớp học',
        'ket_qua.html': 'Kết quả',
        'gui_bai.html': 'Bài thi',
        'trang_lam.html': 'Làm bài',
        'xem_dap_an.html': 'Xem đáp án'
    };
    
    pageTitle.textContent = titles[page] || 'Vinhzota';
    
    // Load page
    frame.src = page;
    
    // Update active nav
    document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
    });
    event.currentTarget.classList.add('active');
}

// Logout
function logout() {
    if (confirm('Bạn có chắc chắn muốn đăng xuất?')) {
        window.location.href = 'dang_nhap.html';
    }
}

// Check auth on load
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const response = await fetch('/vinhzota/controllers/auth_controller.php?action=check_auth');
        const result = await response.json();
        
        if (result.authenticated) {
            document.getElementById('userName').textContent = result.user.full_name;
            document.getElementById('userAvatar').textContent = result.user.full_name.charAt(0).toUpperCase();
        }
    } catch (error) {
        console.error('Auth error:', error);
    }
});
</script>

</body>
</html>
