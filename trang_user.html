<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Học phần 2 beautifull - Bắt đầu thi</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-bg: #1a3a6b;
    --sidebar-w: 60px;
    --topbar-h: 60px;
    --primary: #1e5abf;
    --accent-orange: #f97316;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --text-light: #94a3b8;
    --border: #e2e8f0;
    --bg: #eef2f7;
    --card-bg: #ffffff;
  }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    color: var(--text-main);
    display: flex;
    min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 0;
    gap: 6px;
    position: fixed;
    top: 0; left: 0;
    height: 100vh;
    z-index: 100;
  }

  .sidebar .logo {
    margin-bottom: 18px;
  }

  .sidebar-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.55);
    font-size: 18px;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .sidebar-icon:hover { background: rgba(255,255,255,0.13); color: #fff; }
  .sidebar-icon.active { background: rgba(255,255,255,0.18); color: #fff; }
  .sidebar-bottom { margin-top: auto; }

  /* ── MAIN ── */
  .main-wrap {
    margin-left: var(--sidebar-w);
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 100vh;
  }

  /* ── TOPBAR ── */
  .topbar {
    height: var(--topbar-h);
    background: #fff;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 22px;
    gap: 12px;
    position: sticky; top: 0;
    z-index: 50;
  }
  .topbar .back-btn {
    display: flex; align-items: center; gap: 6px;
    color: var(--text-main);
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: color .15s;
  }
  .topbar .back-btn:hover { color: var(--primary); }

  .topbar-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 10px;
  }

  .btn-boquangcao {
    background: linear-gradient(90deg, #38bdf8, #6366f1);
    color: #fff;
    border: none;
    padding: 7px 16px;
    border-radius: 8px;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    transition: opacity .15s;
  }
  .btn-boquangcao:hover { opacity: .88; }

  .flag-icon {
    width: 28px; height: 20px;
    border-radius: 3px;
    background: #da251d;
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .flag-icon::after { content: '⭐'; color: #f5d110; }

  .notif-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; color: var(--text-muted);
    transition: background .15s;
  }
  .notif-btn:hover { background: var(--border); }

  .user-chip {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer;
  }
  .user-chip .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #38bdf8);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 14px;
  }
  .user-chip .user-info .name { font-size: 13px; font-weight: 600; line-height: 1.2; }
  .user-chip .user-info .role { font-size: 11px; color: var(--text-muted); }

  /* ── CONTENT ── */
  .content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 50px 20px;
    gap: 18px;
  }

  /* ── CARD ── */
  .exam-card {
    background: var(--card-bg);
    border-radius: 16px;
    border: 1px solid var(--border);
    width: 100%;
    max-width: 520px;
    padding: 32px 36px 28px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.04);
  }

  .exam-card .exam-title {
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    color: var(--text-main);
    margin-bottom: 10px;
  }

  .exam-code-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 26px;
    font-size: 14px;
    color: var(--text-muted);
  }
  .exam-code-row .code-val {
    font-weight: 600;
    color: var(--text-main);
  }

  /* QR button + tooltip wrapper */
  .qr-wrap {
    position: relative;
    display: inline-flex;
  }
  .qr-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    background: #f8fafc;
    transition: background .15s;
    color: var(--primary);
    font-size: 17px;
  }
  .qr-btn:hover { background: #e8f0fe; }

  .qr-tooltip {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #1e293b;
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 7px;
    white-space: nowrap;
    z-index: 10;
    pointer-events: none;
  }
  .qr-tooltip::before {
    content: '';
    position: absolute;
    bottom: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-bottom-color: #1e293b;
  }
  .qr-wrap:hover .qr-tooltip { display: block; }

  /* Info rows */
  .info-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    border-top: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .info-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }

  .info-item .info-left {
    display: flex; align-items: center; gap: 10px;
    color: var(--text-muted);
  }
  .info-item .info-left i {
    font-size: 16px;
    width: 20px; text-align: center;
  }
  .info-item .info-right {
    font-weight: 600;
    color: var(--text-main);
  }

  /* Start button */
  .btn-start {
    width: 100%;
    background: var(--accent-orange);
    color: #fff;
    border: none;
    padding: 14px 0;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    letter-spacing: .3px;
    transition: background .15s, transform .1s;
    box-shadow: 0 4px 14px rgba(249,115,22,0.35);
  }
  .btn-start:hover { background: #ea6c0a; transform: translateY(-1px); }
  .btn-start:active { transform: translateY(0); }

  /* History button */
  .btn-history {
    background: #f1f5f9;
    color: var(--text-muted);
    border: none;
    padding: 11px 28px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .btn-history:hover { background: #e2e8f0; color: var(--text-main); }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="36" height="36" rx="10" fill="white" fill-opacity="0.15"/>
      <path d="M8 18 L18 8 L28 18 L18 28 Z" stroke="white" stroke-width="2.2" fill="none"/>
      <path d="M18 8 L28 18" stroke="#38bdf8" stroke-width="2.2"/>
    </svg>
  </div>
  <div class="sidebar-icon active"><i class="fas fa-layer-group"></i></div>
  <div class="sidebar-icon"><i class="fas fa-bookmark"></i></div>
  <div class="sidebar-bottom">
    <div class="sidebar-icon"><i class="fas fa-cog"></i></div>
  </div>
</aside>

<!-- MAIN -->
<div class="main-wrap">

  <!-- TOPBAR -->
  <header class="topbar">
    <a class="back-btn" href="#">
      <i class="fas fa-chevron-left"></i>
      Quay lại
    </a>
    <div class="topbar-right">
      <button class="btn-boquangcao">
        <i class="fas fa-gem"></i> Bỏ quảng cáo
      </button>
      <div class="flag-icon"></div>
      <div class="notif-btn"><i class="fas fa-bell"></i></div>
      <div class="user-chip">
        <div class="avatar">CV</div>
        <div class="user-info">
          <div class="name">Công Vinh</div>
          <div class="role">Học sinh</div>
        </div>
      </div>
    </div>
  </header>

  <!-- CONTENT -->
  <div class="content-area">

    <div class="exam-card">
      <div class="exam-title">Học phần 2 beautifull</div>

      <div class="exam-code-row">
        Mã đề thi: <span class="code-val">aqi0gg</span>
        <div class="qr-wrap">
          <div class="qr-btn">
            <i class="fas fa-qrcode"></i>
          </div>
          <div class="qr-tooltip">Quét hoặc tải mã QR code</div>
        </div>
      </div>

      <div class="info-list">
        <div class="info-item">
          <div class="info-left">
            <i class="fas fa-clock"></i>
            Thời gian làm bài
          </div>
          <div class="info-right">Không giới hạn</div>
        </div>
        <div class="info-item">
          <div class="info-left">
            <i class="fas fa-calendar-clock" style="font-size:15px"></i>
            Thời gian vào thi
          </div>
          <div class="info-right">Không thời hạn</div>
        </div>
        <div class="info-item">
          <div class="info-left">
            <i class="fas fa-circle-question"></i>
            Số lượng câu hỏi
          </div>
          <div class="info-right">210</div>
        </div>
        <div class="info-item">
          <div class="info-left">
            <i class="fas fa-file-lines"></i>
            Loại đề
          </div>
          <div class="info-right">Trắc nghiệm</div>
        </div>
        <div class="info-item">
          <div class="info-left">
            <i class="fas fa-users"></i>
            Tổng lượt đã làm của đề
          </div>
          <div class="info-right">53 lượt</div>
        </div>
      </div>

      <button class="btn-start">
        Bắt đầu thi &nbsp;<i class="fas fa-chevron-right"></i>
      </button>
    </div>

    <button class="btn-history">Xem lịch sử làm bài</button>

  </div>
</div>

</body>
</html>
